name: 'Put It Out There (internal)'
description: 'Internal step-level wrapper around the putitoutthere CLI. Consumers compose with the reusable workflow at .github/workflows/release.yml@v0, not with this action directly. See notes/design-commitments.md non-goal #10.'
author: 'Kevin Scott'

inputs:
  command:
    description: 'Which CLI subcommand to run. Canonical values are `plan`, `publish`, and `write-version`.'
    required: false
    default: 'plan'
  working_directory:
    description: >-
      Path the CLI runs against. For `plan` / `publish`, forwarded as
      `--cwd`. For `write-version` (#276), forwarded as `--path` —
      the package directory whose pyproject.toml / Cargo.toml gets
      bumped. Defaults to the runner working directory. Internal use;
      the reusable workflow supplies this when invoked against a
      non-root tree (e.g. e2e fixtures materialized into a subdir,
      or a per-package `matrix.path`).
    required: false
    default: ''
  version:
    description: >-
      Planned version string. Required when `command: write-version`
      (#276); ignored otherwise. The reusable workflow forwards the
      build matrix's `version` row from the planner.
    required: false
    default: ''
  fail_on_error:
    description: 'If true, non-zero CLI exit codes fail the step.'
    required: false
    default: 'true'

outputs:
  matrix:
    description: "JSON matrix emitted by `plan`. Output key is omitted when the plan resolves to zero rows or when command is anything other than plan; downstream jobs should coalesce with `|| '[]'`."

runs:
  using: 'node24'
  main: 'dist-action/index.js'
