name: 'Put It Out There'
description: 'Polyglot release orchestrator for crates.io, PyPI, and npm.'
author: 'Kevin Scott'

inputs:
  command:
    description: 'Which putitoutthere CLI subcommand to run. Canonical CI values are `plan` and `publish`; `doctor` and `preflight` are useful for diagnostics. Other CLI subcommands (init, token, auth, version) work but are designed for local terminals.'
    required: false
    default: 'plan'
  dry_run:
    description: 'If true, resolve the plan but skip all destructive operations.'
    required: false
    default: 'false'
  fail_on_error:
    description: 'If true, non-zero putitoutthere exit codes fail the step.'
    required: false
    default: 'true'

outputs:
  matrix:
    description: 'JSON matrix emitted by `putitoutthere plan`. Output key is omitted entirely when the plan resolves to zero rows or when command is anything other than plan; downstream jobs should coalesce with `|| ''[]'''` (see docs/api/action.md).'

runs:
  using: 'node24'
  main: 'dist-action/index.js'
