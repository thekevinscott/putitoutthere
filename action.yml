name: 'Put It Out There'
description: 'Polyglot release orchestrator for crates.io, PyPI, and npm.'
author: 'Kevin Scott'

inputs:
  command:
    description: 'Which putitoutthere command to run: plan | publish'
    required: false
    default: 'plan'
  dry_run:
    description: 'If true, resolve the plan but skip all destructive operations.'
    required: false
    default: 'false'
  fail_on_error:
    description: 'If true, non-zero putitoutthere exit codes fail the step.'
    required: false
    default: 'true'

outputs:
  matrix:
    description: 'JSON matrix emitted by `putitoutthere plan`. Empty string for other commands.'

runs:
  using: 'node20'
  main: 'dist-action/index.js'
