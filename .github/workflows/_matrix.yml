name: putitoutthere matrix

# Internal reusable workflow: plan + build jobs.
#
# Consumer-facing workflows (`release.yml`, `build.yml`) call this
# workflow as `uses: thekevinscott/putitoutthere/.github/workflows/_matrix.yml@v0`
# so the plan + build steps live in exactly one place. release.yml then
# adds its own `publish` job that consumes the matrix + has_pypi outputs;
# build.yml stops here. Single source of truth — every action pin, every
# `if:` guard on `matrix.kind` / `matrix.build` / `matrix.target`, every
# shell snippet — only exists in this file.
#
# Permissions: contents: read only. No `id-token: write`. The build path
# must never grow publish-capable bytes — see issue #272 design notes.
# A grep assertion in `actionlint.yml` guards against drift.
#
# Concurrency: callers own the concurrency group. release.yml uses a
# repository-keyed group with cancel-in-progress: false; build.yml uses
# a ref-keyed group with cancel-in-progress: true. Declaring concurrency
# here would double-gate runs.
#
# The `uses: thekevinscott/putitoutthere@v0` call below resolves to the
# same git ref the workflow itself was loaded from, matching the
# contract release.yml documents in its own header.

on:
  workflow_call:
    inputs:
      node_version:
        description: >-
          Node version for plan / publish runners and for kind = "npm"
          build steps. Default `24`.
        type: string
        default: '24'
      pnpm_version:
        description: >-
          pnpm version installed on plan / build runners. Default `11`.
          Override if your repo's lockfile or workspace config targets a
          different major — pnpm has moved config keys between majors
          (e.g. the build allowlist is `pnpm.onlyBuiltDependencies` in
          package.json on 9, `onlyBuiltDependencies` in
          pnpm-workspace.yaml on 10, and `allowBuilds` on 11).
        type: string
        default: '11'
      python_version:
        description: >-
          Deprecated (#369): superseded by per-package
          `python_versions` in `putitoutthere.toml` and by
          `requires-python` inference. `kind = "pypi"` build steps now
          read the Python version from the planned matrix row, not
          this input. Retained so existing callers don't break; it has
          no effect on pypi builds.
        type: string
        default: '3.12'
      release_packages:
        description: >-
          Manual-release spec forwarded to `plan`. Comma-separated
          `name[@<bump|version>]` entries; when set, change detection
          is bypassed and exactly the named packages are planned.
          Empty (the default) => normal change-detected planning.
        type: string
        default: ''
    outputs:
      matrix:
        description: >-
          The plan matrix as a JSON string. Empty matrices serialize to
          `'[]'`. Consumers (`release.yml`'s publish job) parse this
          via `fromJSON()` and gate downstream jobs on non-empty.
        value: ${{ jobs.plan.outputs.matrix }}
      has_pypi:
        description: >-
          `'true'` when the planned matrix contains any pypi rows, else
          `'false'`. release.yml re-exposes this as its own workflow_call
          output so consumers can gate their caller-side `pypi-publish`
          job; build.yml does not (pass/fail gate, no caller jobs).
        value: ${{ jobs.plan.outputs.has_pypi }}

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_pypi: ${{ steps.has-pypi.outputs.has_pypi }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - id: plan
        uses: thekevinscott/putitoutthere@v0
        with:
          command: plan
          release_packages: ${{ inputs.release_packages }}

      # Compute a boolean "has_pypi" the consumer can gate their
      # caller-side pypi-publish job on. PyPI uploads run in the
      # caller's workflow context (not this reusable workflow) per
      # the warehouse#11096 architectural constraint — see
      # notes/audits/2026-04-28-pypi-tp-reusable-workflow-constraint.md.
      - id: has-pypi
        env:
          MATRIX: ${{ steps.plan.outputs.matrix }}
        run: |
          set -euo pipefail
          # Bash-safe substring check; the matrix is a JSON array of
          # objects each carrying a `kind` field.
          if printf '%s' "${MATRIX:-}" | grep -q '"kind":"pypi"'; then
            echo "has_pypi=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pypi=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: plan
    if: fromJSON(needs.plan.outputs.matrix || '[]')[0] != null
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # #391: prime ~/.cargo and target/ from the previous matching run's
      # cache so per-target matrix cells don't cold-compile their full
      # Cargo dep graph on every PR — the dominant cost on bundle_cli,
      # napi, and maturin matrices (observed at 4-6 min per cell with no
      # Rust changes on a downstream consumer; full release-precheck
      # workflow ~8 min).
      #
      # Gated to fire only on rows that actually invoke cargo:
      #   - pypi/maturin non-sdist: maturin shells out to cargo (and
      #     covers the pypi bundle_cli sub-build, same row).
      #   - npm/napi: the consumer's `napi build` script calls cargo.
      #   - npm/bundled-cli non-main: engine's `cargo build` for the
      #     staged CLI binary.
      # Pure-Python sdist, pure-Python hatch wheels, npm vanilla, and
      # the bundled-cli `main` row produce no cargo work and skip the
      # cache.
      #
      # `shared-key: matrix.target` partitions the cache slot per target
      # triple so a write to one target's slot doesn't blow away the
      # next cell's. `workspaces` enumerates every Cargo.toml-bearing
      # path the matrix may touch: `matrix.path` for the consumer's
      # package crate (maturin / napi / single-crate bundled-cli) plus
      # `matrix.bundle_cli.crate_path` for the bundle_cli crate when
      # it lives in a separate dir from `matrix.path` (the dirsql shape).
      # The second line resolves to empty when bundle_cli is unset and
      # Swatinem silently skips it.
      - if: (matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.target != 'sdist') || (matrix.kind == 'npm' && matrix.build == 'napi') || (matrix.kind == 'npm' && matrix.build == 'bundled-cli' && matrix.target != 'main')
        name: cargo cache (#391)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}
          workspaces: |
            ${{ matrix.path }}
            ${{ matrix.bundle_cli.crate_path }}

      # ---- pypi ----
      # #369: each pypi row carries its own `python_version` (the
      # planner fans the matrix across the package's supported set,
      # inferred from `requires-python` or pinned via
      # `python_versions`). setup-python provisions exactly that
      # interpreter; the maturin build step below selects it explicitly.
      - if: matrix.kind == 'pypi'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      # #276: bump the version source on disk to matrix.version BEFORE
      # maturin reads it. Maturin reads [project].version from
      # pyproject.toml (or [package].version from a sibling Cargo.toml
      # when pyproject declares dynamic = ["version"]) at build time,
      # with no env override. Without this step, wheels ship at
      # whatever literal is in the consumer's manifest — diverging
      # from the planned version and tripping PyPI's "file already
      # exists" rejection at upload. crates / npm bump at publish;
      # setuptools-scm / hatch-vcs use SETUPTOOLS_SCM_PRETEND_VERSION
      # below. Maturin is the only build path with no fallback, so
      # the bump has to live here.
      - if: matrix.kind == 'pypi' && matrix.build == 'maturin'
        uses: thekevinscott/putitoutthere@v0
        with:
          command: write-version
          working_directory: ${{ matrix.path }}
          version: ${{ matrix.version }}

      # Two invocations: `maturin build --sdist` produces wheel AND sdist
      # (the flag is "also build sdist", not "only build sdist"), so the
      # sdist row would emit a wheel artifact that collides with the
      # per-target wheel rows at upload time. Use `command: sdist` for
      # the sdist row, which produces sdist-only.
      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.target == 'sdist'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ matrix.path }}
          command: sdist
          args: --out dist

      # #282: bundle_cli — cross-compile a Rust CLI per target and stage
      # it into the package source tree so maturin's [tool.maturin].include
      # glob picks it up as wheel data. Without these steps, wheels for
      # consumers who declare `[package.bundle_cli]` ship without the
      # binary and `pip install <pkg> && <pkg> ...` fails at runtime with
      # FileNotFoundError. Sdist row is excluded — sdists are source-only.
      #
      # Targets resolve to native runners via `defaultRunsOn` in
      # `src/plan.ts`, so cargo cross-compile linkers are not needed:
      # x86_64-linux on ubuntu-latest, aarch64-linux on ubuntu-24.04-arm,
      # darwin on macos-latest, windows on windows-2022 (pinned; see #354).
      # Rust is pre-installed on all GHA runners; we only `rustup target add`
      # to make the triple known.
      # #381: compile bundle_cli Linux binaries against the musl-mapped
      # triple. cargo build runs directly on the runner; ubuntu-latest's
      # glibc (currently 2.39 on 24.04) gets baked into the binary as a
      # version requirement, so any older Linux at install time fails
      # with `version 'GLIBC_2.x' not found`. Statically-linked musl has
      # no glibc floor and runs on any Linux ≥ kernel 3.2. The package's
      # declared target triple (used for npm package naming, napi build,
      # wheel tag, artifact name) stays unchanged; only the bundled
      # binary inside it switches compile triple. Non-Linux and already-
      # musl triples pass through unchanged (`-linux-gnu` substring
      # absent → no-op substitution).
      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.bundle_cli && matrix.target != 'sdist'
        name: bundle_cli — add Rust target
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          BINARY_TARGET="${TARGET//-linux-gnu/-linux-musl}"
          rustup target add "$BINARY_TARGET"

      # `rustup target add` registers the musl Rust target but does not
      # install the C cross-compiler that crates with C source deps
      # (libsqlite3-sys --bundled, openssl-sys, etc.) need at build time.
      # musl-tools provides musl-gcc; CC_<triple> tells cargo to use it.
      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.bundle_cli && matrix.target != 'sdist' && contains(matrix.target, 'linux')
        name: bundle_cli — install musl C toolchain
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          BINARY_TARGET="${TARGET//-linux-gnu/-linux-musl}"
          sudo apt-get install -y musl-tools
          # cargo reads CC_<triple_with_underscores> to find the C cross-compiler.
          triple_under="${BINARY_TARGET//-/_}"
          echo "CC_${triple_under}=musl-gcc" >> "$GITHUB_ENV"

      # #374: bump the separate bundle_cli crate's `[package].version`
      # before `cargo build` runs. The maturin `write-version` step
      # above bumps the Python package's version source; it does not
      # touch the CLI crate at `bundle_cli.crate_path`. cargo bakes
      # CARGO_PKG_VERSION from that crate's on-disk Cargo.toml at
      # compile time, so the staged binary must get the same direct
      # Cargo.toml rewrite as the npm bundled-cli path.
      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.bundle_cli && matrix.target != 'sdist'
        name: bundle_cli — write crate version for ${{ matrix.name }}
        uses: thekevinscott/putitoutthere@v0
        with:
          command: write-crate-version
          working_directory: ${{ matrix.bundle_cli.crate_path }}
          version: ${{ matrix.version }}

      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.bundle_cli && matrix.target != 'sdist'
        name: bundle_cli — cargo build for ${{ matrix.target }} (${{ matrix.bundle_cli.bin }})
        shell: bash
        working-directory: ${{ matrix.bundle_cli.crate_path }}
        env:
          TARGET: ${{ matrix.target }}
          BIN: ${{ matrix.bundle_cli.bin }}
          # #300: support the lib-with-optional-CLI shape (ruff/uv/
          # pydantic-core/biome/swc/dirsql) where the binary lives behind
          # `[[bin]] required-features = ["cli"]`. Empty `features` and
          # `no_default_features = false` (the schema defaults) leave the
          # cargo invocation byte-identical to its pre-#300 form.
          FEATURES: ${{ join(matrix.bundle_cli.features, ',') }}
          NO_DEFAULT_FEATURES: ${{ matrix.bundle_cli.no_default_features }}
        # #337: pin `--target-dir target` so the produced binary lands at
        # `${CRATE_PATH}/target/<triple>/release/<bin>` regardless of
        # whether `crate_path` points at a workspace root or a member
        # crate. cargo's default target-dir is workspace-rooted; without
        # the explicit pin, the stage step below (which reads from
        # `${CRATE_PATH}/target/...`) can't find the binary whenever
        # the crate participates in a `[workspace]`.
        run: |
          set -euo pipefail
          # #381: see the `add Rust target` step above for the gnu→musl rationale.
          BINARY_TARGET="${TARGET//-linux-gnu/-linux-musl}"
          args=(build --release --target "$BINARY_TARGET" --bin "$BIN" --target-dir target)
          if [ -n "$FEATURES" ]; then args+=(--features "$FEATURES"); fi
          if [ "$NO_DEFAULT_FEATURES" = "true" ]; then args+=(--no-default-features); fi
          cargo "${args[@]}"

      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.bundle_cli && matrix.target != 'sdist'
        name: bundle_cli — stage binary into ${{ matrix.path }}/${{ matrix.bundle_cli.stage_to }}
        shell: bash
        env:
          CRATE_PATH: ${{ matrix.bundle_cli.crate_path }}
          PKG_PATH: ${{ matrix.path }}
          STAGE_TO: ${{ matrix.bundle_cli.stage_to }}
          BIN: ${{ matrix.bundle_cli.bin }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          # #381: read from the musl-mapped target dir cargo built into.
          BINARY_TARGET="${TARGET//-linux-gnu/-linux-musl}"
          if [ "$RUNNER_OS" = "Windows" ]; then ext=".exe"; else ext=""; fi
          src="${CRATE_PATH}/target/${BINARY_TARGET}/release/${BIN}${ext}"
          dst_dir="${PKG_PATH}/${STAGE_TO}"
          if [ ! -f "$src" ]; then
            echo "::error::cargo build did not produce ${src}"
            ls -la "${CRATE_PATH}/target/${BINARY_TARGET}/release/" || true
            exit 1
          fi
          mkdir -p "$dst_dir"
          cp "$src" "$dst_dir/"
          echo "staged: $src -> $dst_dir/${BIN}${ext}"

      # #369: build the wheel for this row's specific CPython version.
      # maturin's linux builds run inside a manylinux container that
      # ships every CPython, so the interpreter has to be selected
      # explicitly — `-i <version>` (a bare `3.12`) is resolved by
      # maturin's manylinux interpreter scan. macOS uses the host
      # `python<version>` that setup-python provisioned. Windows omits
      # `-i` entirely: maturin's non-container build there already uses
      # the single host interpreter setup-python pinned to this row's
      # version.
      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.target != 'sdist'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ matrix.path }}
          command: build
          args: >-
            --release --out dist --target ${{ matrix.target }}
            ${{ runner.os == 'Linux' && format('--interpreter {0}', matrix.python_version)
                || (runner.os == 'macOS' && format('--interpreter python{0}', matrix.python_version) || '') }}

      # #282: wheel-content guard. Permanent defense-in-depth — the
      # produced wheel must contain the staged binary at <stage_to>/<bin>.
      # Catches the bug shape this issue tracks (no staging happened) and
      # any future regression where the cross-compile silently routes the
      # binary to the wrong path. Runs before upload-artifact, so a
      # broken wheel never leaves the build runner.
      #
      # Path-inside-wheel notes: maturin rewrites paths from the package
      # source root into the wheel's distribution layout. The exact path
      # depends on the consumer's pyproject layout (`python/<pkg>/...`
      # vs `src/<pkg>/...`), so we can't assert against a fully qualified
      # in-wheel path. We assert that *some* directory inside the wheel
      # ends in the consumer's `stage_to` and contains the named bin —
      # which is the strongest cross-layout assertion that still catches
      # "binary missing entirely."
      #
      # #338: when `[tool.maturin].python-source` is set (the standard
      # `maturin new --mixed` layout), maturin strips that prefix from
      # on-disk paths when rewriting them into the wheel's distribution
      # layout. A binary that lives on disk at
      # `<pkg.path>/<stage_to>/<bin>` = e.g. `packages/python/python/dirsql/_binary/dirsql`
      # ends up in the wheel at `dirsql/_binary/dirsql` — `python/`
      # stripped. The guard reads `python-source` from the consumer's
      # pyproject and subtracts it from `stage_to` before constructing
      # the regex; when unset/empty the behaviour is identical.
      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.bundle_cli && matrix.target != 'sdist'
        name: bundle_cli — verify wheel contains ${{ matrix.bundle_cli.stage_to }}/${{ matrix.bundle_cli.bin }}
        shell: bash
        env:
          PKG_PATH: ${{ matrix.path }}
          STAGE_TO: ${{ matrix.bundle_cli.stage_to }}
          BIN: ${{ matrix.bundle_cli.bin }}
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then ext=".exe"; else ext=""; fi
          dist_dir="${PKG_PATH}/dist"
          wheel=$(find "$dist_dir" -maxdepth 1 -name '*.whl' -print -quit)
          if [ -z "${wheel:-}" ]; then
            echo "::error::no wheel produced under ${dist_dir}"
            exit 1
          fi
          # Read `[tool.maturin].python-source` (or the legacy
          # `python_source` spelling). Either form is accepted by maturin
          # across versions. An unset/empty value resolves to "" and
          # leaves stage_suffix == stage_to.
          python_source=$(python3 - "$PKG_PATH" <<'PY'
          import sys, tomllib, pathlib
          path = pathlib.Path(sys.argv[1]) / "pyproject.toml"
          try:
              cfg = tomllib.loads(path.read_text(encoding="utf-8"))
          except FileNotFoundError:
              print("")
              sys.exit(0)
          tm = cfg.get("tool", {}).get("maturin", {})
          # Both spellings appear across maturin releases; honor either.
          src = tm.get("python-source", tm.get("python_source", "")) or ""
          # Normalize: drop any leading `./` and a trailing `/`.
          src = src.removeprefix("./").rstrip("/")
          print(src)
          PY
          )
          # Strip leading ./ if present, then subtract any python-source
          # prefix that maturin will strip from the wheel layout.
          stage_suffix="${STAGE_TO#./}"
          if [ -n "${python_source}" ]; then
            # Strip exact-prefix match plus its trailing slash. Leave
            # stage_suffix unchanged when python-source is set but isn't
            # actually a prefix of stage_to — that combination is the
            # consumer's misconfiguration to surface, not the workflow's.
            stripped="${stage_suffix#"${python_source}"/}"
            if [ "${stripped}" != "${stage_suffix}" ]; then
              stage_suffix="${stripped}"
            fi
          fi
          expected="${BIN}${ext}"
          if ! unzip -l "$wheel" | awk '{print $NF}' \
               | grep -qE "(^|/)${stage_suffix}/${expected}\$"; then
            echo "::error::wheel $(basename "$wheel") missing bundle_cli binary at ${stage_suffix}/${expected}"
            echo "wheel contents:"
            unzip -l "$wheel"
            exit 1
          fi
          echo "ok bundle_cli: ${stage_suffix}/${expected} present in $(basename "$wheel")"

      - if: matrix.kind == 'pypi' && matrix.build != 'maturin' && matrix.target == 'sdist'
        # hatch-vcs / setuptools-scm derive the version from the latest git
        # tag at build time — which is still the *previous* release at this
        # point. Feed the planned version through setuptools-scm's global
        # pretend-version env so the sdist filename matches what we're about
        # to publish. Per-package variants are silently ignored by hatch-vcs;
        # only the global one works.
        working-directory: ${{ matrix.path }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ matrix.version }}
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir dist

      # #324: pure-Python hatch packages also produce an any-platform
      # wheel so PyPI ends up with both sdist and wheel. Without this,
      # downstream `pip install` / `uvx ...` had to provision hatchling
      # and run `python -m build` on a cold cache instead of doing a
      # sub-second download-and-extract. The wheel row is hatch-only
      # (see plan.ts); setuptools stays sdist-only, maturin keeps its
      # per-target wheel rows.
      - if: matrix.kind == 'pypi' && matrix.build == 'hatch' && matrix.target == 'any'
        working-directory: ${{ matrix.path }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ matrix.version }}
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir dist

      # ---- npm ----
      - if: matrix.kind == 'npm'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://registry.npmjs.org'

      # #299: bundled-cli launcher — author `bin/<bin>.js` +
      # `package.json#bin` for the main package before `npm run build`
      # runs. The launcher is templated on (pkg name, configured
      # targets) and identical across consumers; the engine writes it
      # in place, only if absent (so consumers can override either
      # piece). Same `working_directory` → `--path` plumbing as the
      # pypi write-version step above.
      - if: matrix.kind == 'npm' && matrix.build == 'bundled-cli' && matrix.target == 'main'
        name: write-launcher — generate bundled-cli launcher for ${{ matrix.name }}
        uses: thekevinscott/putitoutthere@v0
        with:
          command: write-launcher
          working_directory: ${{ matrix.path }}

      # #298: bundle_cli — cross-compile a Rust CLI per target and stage
      # it under `${{ matrix.artifact_path }}` so the engine's npm-platform
      # handler packages it into the per-platform tarball. Same shape as
      # the maturin/pypi block above. Without these steps, npm bundled-cli
      # consumers are still required to author a `scripts/build.cjs` that
      # cargo-builds the binary themselves; absorbing the script removes
      # the largest remaining piece of consumer integration surface for
      # this recipe (#287 documented the seam between consumer scripts
      # and the engine env contract; #298 closes the seam entirely).
      #
      # Targets resolve to native runners via `defaultRunsOn` in
      # `src/plan.ts`, so cargo cross-compile linkers are not needed.
      # The `main` target row is the noarch top-level package — it has
      # no per-target binary to compile.
      # #381: see the pypi/maturin `add Rust target` step's banner above
      # for the gnu→musl mapping rationale. Same rule applies here.
      - if: matrix.kind == 'npm' && matrix.build == 'bundled-cli' && matrix.bundle_cli && matrix.target != 'main'
        name: bundle_cli — add Rust target
        shell: bash
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail
          # #387: matrix.rust_target is the engine-resolved Rust triple.
          # plan.ts maps the npm-flavor matrix.target (linux-x64-gnu, …) to
          # its Rust form via toRustTriple, so no inline napi→rust lookup is
          # needed here. A bare ${matrix.target//-linux-gnu/-linux-musl}
          # would be a no-op on npm triples (linux-x64-gnu lacks the
          # -linux-gnu suffix); the swap below runs on the Rust triple.
          # #381: cross-compile against the musl-mapped triple on Linux.
          BINARY_TARGET="${RUST_TARGET//-linux-gnu/-linux-musl}"
          rustup target add "$BINARY_TARGET"

      # Mirror of the pypi path above: musl-tools + CC export so crates
      # with C source deps can cross-compile to the musl target.
      - if: matrix.kind == 'npm' && matrix.build == 'bundled-cli' && matrix.bundle_cli && matrix.target != 'main' && contains(matrix.target, 'linux')
        name: bundle_cli — install musl C toolchain
        shell: bash
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail
          # #387: derive the CC_ env var from the engine-resolved Rust
          # triple (matrix.rust_target); the npm-flavor matrix.target would
          # yield CC_linux_x64_musl instead of the Rust-triple name cargo
          # looks up, and the C compiler would not be found.
          BINARY_TARGET="${RUST_TARGET//-linux-gnu/-linux-musl}"
          sudo apt-get install -y musl-tools
          triple_under="${BINARY_TARGET//-/_}"
          echo "CC_${triple_under}=musl-gcc" >> "$GITHUB_ENV"

      # #366: bump the crate's `[package].version` to matrix.version
      # before `cargo build` runs. `cargo build` bakes CARGO_PKG_VERSION
      # into the binary at compile time from the on-disk Cargo.toml,
      # with no env override — so without this step the cross-compiled
      # CLI reports the stale crate literal from `--version` instead of
      # the planned release version (e.g. `@scope/cli-<triple>@0.3.5`
      # shipping a binary that says `0.2.7`). Mirrors the maturin/pypi
      # `write-version` step above; `write-version` itself is
      # maturin-specific (it requires a `pyproject.toml`), so the npm
      # bundled-cli path uses the Cargo.toml-direct `write-crate-version`.
      - if: matrix.kind == 'npm' && matrix.build == 'bundled-cli' && matrix.bundle_cli && matrix.target != 'main'
        name: bundle_cli — write crate version for ${{ matrix.name }}
        uses: thekevinscott/putitoutthere@v0
        with:
          command: write-crate-version
          working_directory: ${{ matrix.bundle_cli.crate_path }}
          version: ${{ matrix.version }}

      - if: matrix.kind == 'npm' && matrix.build == 'bundled-cli' && matrix.bundle_cli && matrix.target != 'main'
        name: bundle_cli — cargo build for ${{ matrix.target }} (${{ matrix.bundle_cli.bin }})
        shell: bash
        working-directory: ${{ matrix.bundle_cli.crate_path }}
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
          BIN: ${{ matrix.bundle_cli.bin }}
          # Mirror of the pypi shape (#300). Empty `features` and
          # `no_default_features = false` (schema defaults) leave the
          # cargo invocation byte-identical to its `--features`-less form.
          FEATURES: ${{ join(matrix.bundle_cli.features, ',') }}
          NO_DEFAULT_FEATURES: ${{ matrix.bundle_cli.no_default_features }}
        # Build the cargo invocation in a single non-empty array, mirroring
        # the pypi cargo-build step above. `cmd=()` followed by
        # `"${cmd[@]}"` on an empty array errors out under bash 3.2 + set
        # -u ("unbound variable") — and macOS runners ship bash 3.2 by
        # default. The array always starts with `(cargo build --release
        # ...)`, so the expansion is safe on every runner.
        #
        # #337: pin `--target-dir target` so the produced binary lands at
        # `${CRATE_PATH}/target/<triple>/release/<bin>` regardless of
        # whether `crate_path` points at a workspace root or a member
        # crate. Mirrors the pypi cargo-build step's fix; same workspace
        # target-dir bug shape, same resolution.
        run: |
          set -euo pipefail
          # #387: matrix.rust_target is the engine-resolved Rust triple
          # (plan.ts maps the npm-flavor matrix.target via toRustTriple).
          # #381: cross-compile against the musl-mapped triple on Linux.
          BINARY_TARGET="${RUST_TARGET//-linux-gnu/-linux-musl}"
          cmd=(cargo build --release --target "$BINARY_TARGET" --bin "$BIN" --target-dir target)
          if [ -n "$FEATURES" ]; then cmd+=(--features "$FEATURES"); fi
          if [ "$NO_DEFAULT_FEATURES" = "true" ]; then cmd+=(--no-default-features); fi
          "${cmd[@]}"

      # #429: bump the napi crate's version to matrix.version before
      # `napi build` (inside `npm run build`) bakes CARGO_PKG_VERSION into
      # the compiled `.node`. Mirror of the bundled-cli write-crate-version
      # step above (#366) and the maturin write-version step (#276): without
      # it the per-triple `.node` ships the stale on-disk crate literal, so
      # a library re-exposing the Rust core's version() through napi reports
      # a version diverging from the published npm package (whose synthesized
      # package.json version is already correct). #428: write-crate-version
      # resolves `version.workspace = true` to the workspace root, so a
      # polyglot-workspace napi crate is handled too.
      #
      # The bump runs only when the napi crate's Cargo.toml is COLOCATED at
      # the package path (the napi-rs single-crate default: Cargo.toml beside
      # package.json — the shape template-lib and the js-napi fixture use). A
      # multi-mode package (napi + bundled-cli) or one whose napi crate lives
      # elsewhere has no Cargo.toml at matrix.path, and there is no per-napi
      # `crate_path` config to point at it yet, so the bump is skipped with a
      # notice rather than guessed. The noarch `main` row compiles no
      # `.node`, so it is excluded.
      - if: matrix.kind == 'npm' && matrix.build == 'napi' && matrix.target != 'main'
        name: napi — detect colocated crate for ${{ matrix.name }}
        id: napi-crate
        shell: bash
        env:
          PKG_PATH: ${{ matrix.path }}
        run: |
          set -euo pipefail
          if [ -f "${PKG_PATH}/Cargo.toml" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::napi: no Cargo.toml at ${PKG_PATH} — skipping the pre-build crate-version write; the .node will embed its on-disk CARGO_PKG_VERSION. Colocate the napi crate's Cargo.toml with package.json to bake the release version in automatically (multi-mode / separate-crate napi is not yet auto-bumped)."
          fi
      - if: matrix.kind == 'npm' && matrix.build == 'napi' && matrix.target != 'main' && steps.napi-crate.outputs.present == 'true'
        name: napi — write crate version for ${{ matrix.name }}
        uses: thekevinscott/putitoutthere@v0
        with:
          command: write-crate-version
          working_directory: ${{ matrix.path }}
          version: ${{ matrix.version }}

      - if: matrix.kind == 'npm'
        working-directory: ${{ matrix.path }}
        # Build matrix can target Windows runners; default shell there is
        # pwsh, but `if [ -f ... ]` is bash. Force bash for portability.
        #
        # Strict installs (`npm ci`, `pnpm install --frozen-lockfile`) self-
        # heal to their non-strict form on failure. Why: bundled-cli / napi
        # consumers declare `optionalDependencies` for `<name>-<triple>@<version>`
        # platform packages that this pipeline produces. On the first publish,
        # those entries 404 on the registry; pnpm 10 silently drops 404'd
        # optionals from the lockfile when it is regenerated locally, then
        # `--frozen-lockfile` refuses on the next CI run because the lockfile
        # and package.json disagree. The `::warning::` makes the fallback
        # visible in the run log so the consumer understands the recovery.
        # See README → Recipes → Bundled-CLI npm family.
        shell: bash
        env:
          # #287: bundled-cli / napi consumers' build scripts read TARGET
          # to know which triple to cross-compile and stage under
          # `build/<triple>/<bin>`. Multi-mode (napi + bundled-cli)
          # consumers also read BUILD so a single script can dispatch
          # on the mode. Vanilla / `target == 'main'` rows ignore both.
          # Mirrors what `e2e-fixture-job.yml` passes to the same step
          # for the `js-bundled-cli` / `js-napi` fixtures; without this
          # block, the reusable workflow's contract diverged from the
          # fixture and consumers' first publish produced empty
          # `build/<triple>/` artifacts.
          TARGET: ${{ matrix.target }}
          BUILD: ${{ matrix.build }}
          # Via env, not inline interpolation: a `${{ }}` expansion inside
          # `run:` is a script-injection seam. Consumers control this input.
          PNPM_VERSION: ${{ inputs.pnpm_version }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci || {
              echo "::warning::package-lock.json drift (likely 404 on platform-package optionalDependencies for a brand-new bundled-cli/napi family); falling back to npm install"
              npm install
            }
          elif [ -f pnpm-lock.yaml ]; then
            npm install -g "pnpm@${PNPM_VERSION}"
            pnpm install --frozen-lockfile || {
              echo "::warning::pnpm-lock.yaml drift (likely 404 on platform-package optionalDependencies for a brand-new bundled-cli/napi family); falling back to pnpm install --no-frozen-lockfile"
              pnpm install --no-frozen-lockfile
            }
          else
            npm install
          fi
          npm run build --if-present

      # #384: stage the musl binary AFTER npm run build so the engine's
      # statically-linked binary always wins over any glibc-linked binary
      # a consumer build script stages to `build/<triple>/` first.
      - if: matrix.kind == 'npm' && matrix.build == 'bundled-cli' && matrix.bundle_cli && matrix.target != 'main'
        name: bundle_cli — stage binary into ${{ matrix.artifact_path }}
        shell: bash
        env:
          CRATE_PATH: ${{ matrix.bundle_cli.crate_path }}
          DEST_DIR: ${{ matrix.artifact_path }}
          BIN: ${{ matrix.bundle_cli.bin }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail
          # #387: matrix.rust_target is the engine-resolved Rust triple
          # (plan.ts maps the npm-flavor matrix.target via toRustTriple).
          # #381: read from the musl-mapped target dir cargo built into.
          BINARY_TARGET="${RUST_TARGET//-linux-gnu/-linux-musl}"
          if [ "$RUNNER_OS" = "Windows" ]; then ext=".exe"; else ext=""; fi
          src="${CRATE_PATH}/target/${BINARY_TARGET}/release/${BIN}${ext}"
          if [ ! -f "$src" ]; then
            echo "::error::cross-compile did not produce ${src}"
            ls -la "${CRATE_PATH}/target/${BINARY_TARGET}/release/" || true
            exit 1
          fi
          mkdir -p "$DEST_DIR"
          cp "$src" "$DEST_DIR/"
          echo "staged: $src -> $DEST_DIR/${BIN}${ext}"

      # ---- crates ----
      # cargo publish builds on the registry side; no artifact needed
      # at build time. The publish job invokes cargo directly.

      # #298: build-content guard. Permanent defense-in-depth — the
      # staged binary must exist at the path the engine's npm-platform
      # handler reads. Catches the bug shape this issue tracks (no
      # staging happened, the binary lives in the wrong directory)
      # and any future regression where the cross-compile silently
      # routes the binary elsewhere. Runs before upload-artifact, so
      # a broken per-platform tarball never leaves the build runner.
      # Mirror of the wheel-content guard added in #282 for pypi.
      - if: matrix.kind == 'npm' && matrix.build == 'bundled-cli' && matrix.bundle_cli && matrix.target != 'main'
        name: bundle_cli — verify ${{ matrix.artifact_path }}/${{ matrix.bundle_cli.bin }}
        shell: bash
        env:
          DEST_DIR: ${{ matrix.artifact_path }}
          BIN: ${{ matrix.bundle_cli.bin }}
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then ext=".exe"; else ext=""; fi
          expected="${DEST_DIR}/${BIN}${ext}"
          if ! [ -f "$expected" ]; then
            echo "::error::bundle_cli staged binary missing at ${expected}"
            ls -la "${DEST_DIR}" || true
            exit 1
          fi
          echo "ok bundle_cli: ${expected} present"
          # #384: verify the Linux binary is statically linked (musl), not
          # dynamically linked against the build runner's glibc. A glibc-linked
          # binary passes the existence check above but fails at runtime on any
          # Linux with glibc < 2.39. The `file` command outputs "dynamically
          # linked" for glibc binaries and "statically linked" / "static-pie
          # linked" for musl static builds.
          if [ "$RUNNER_OS" != "Windows" ]; then
            command -v file >/dev/null 2>&1 || {
              echo "::error::required command 'file' not found on this runner — cannot assert static linking"
              exit 1
            }
            if file "$expected" | grep -q 'dynamically linked'; then
              echo "::error::bundle_cli binary ${expected} is dynamically linked — expected statically-linked musl build (#384)"
              file "$expected"
              ldd "$expected" 2>&1 || true
              exit 1
            fi
            echo "ok bundle_cli: ${expected} is statically linked"
          fi

      - if: matrix.kind != 'crates'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
