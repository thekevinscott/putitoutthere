name: putitoutthere matrix

# Internal reusable workflow: plan + build jobs.
#
# Consumer-facing workflows (`release.yml`, `build.yml`) call this
# workflow as `uses: thekevinscott/putitoutthere/.github/workflows/_matrix.yml@v0`
# so the plan + build steps live in exactly one place. release.yml then
# adds its own `publish` job that consumes the matrix + has_pypi outputs;
# build.yml stops here. Single source of truth — every action pin, every
# `if:` guard on `matrix.kind` / `matrix.build` / `matrix.target`, every
# shell snippet — only exists in this file.
#
# Permissions: contents: read only. No `id-token: write`. The build path
# must never grow publish-capable bytes — see issue #272 design notes.
# A grep assertion in `actionlint.yml` guards against drift.
#
# Concurrency: callers own the concurrency group. release.yml uses a
# repository-keyed group with cancel-in-progress: false; build.yml uses
# a ref-keyed group with cancel-in-progress: true. Declaring concurrency
# here would double-gate runs.
#
# The `uses: thekevinscott/putitoutthere@v0` call below resolves to the
# same git ref the workflow itself was loaded from, matching the
# contract release.yml documents in its own header.

on:
  workflow_call:
    inputs:
      node_version:
        description: >-
          Node version for plan / publish runners and for kind = "npm"
          build steps. Default `24`.
        type: string
        default: '24'
      python_version:
        description: >-
          Python version for kind = "pypi" build steps. Default `3.12`.
        type: string
        default: '3.12'
    outputs:
      matrix:
        description: >-
          The plan matrix as a JSON string. Empty matrices serialize to
          `'[]'`. Consumers (`release.yml`'s publish job) parse this
          via `fromJSON()` and gate downstream jobs on non-empty.
        value: ${{ jobs.plan.outputs.matrix }}
      has_pypi:
        description: >-
          `'true'` when the planned matrix contains any pypi rows, else
          `'false'`. release.yml re-exposes this as its own workflow_call
          output so consumers can gate their caller-side `pypi-publish`
          job; build.yml does not (pass/fail gate, no caller jobs).
        value: ${{ jobs.plan.outputs.has_pypi }}

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_pypi: ${{ steps.has-pypi.outputs.has_pypi }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - id: plan
        uses: thekevinscott/putitoutthere@v0
        with:
          command: plan

      # Compute a boolean "has_pypi" the consumer can gate their
      # caller-side pypi-publish job on. PyPI uploads run in the
      # caller's workflow context (not this reusable workflow) per
      # the warehouse#11096 architectural constraint — see
      # notes/audits/2026-04-28-pypi-tp-reusable-workflow-constraint.md.
      - id: has-pypi
        env:
          MATRIX: ${{ steps.plan.outputs.matrix }}
        run: |
          set -euo pipefail
          # Bash-safe substring check; the matrix is a JSON array of
          # objects each carrying a `kind` field.
          if printf '%s' "${MATRIX:-}" | grep -q '"kind":"pypi"'; then
            echo "has_pypi=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pypi=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: plan
    if: fromJSON(needs.plan.outputs.matrix || '[]')[0] != null
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ---- pypi ----
      - if: matrix.kind == 'pypi'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      # #276: bump the version source on disk to matrix.version BEFORE
      # maturin reads it. Maturin reads [project].version from
      # pyproject.toml (or [package].version from a sibling Cargo.toml
      # when pyproject declares dynamic = ["version"]) at build time,
      # with no env override. Without this step, wheels ship at
      # whatever literal is in the consumer's manifest — diverging
      # from the planned version and tripping PyPI's "file already
      # exists" rejection at upload. crates / npm bump at publish;
      # setuptools-scm / hatch-vcs use SETUPTOOLS_SCM_PRETEND_VERSION
      # below. Maturin is the only build path with no fallback, so
      # the bump has to live here.
      - if: matrix.kind == 'pypi' && matrix.build == 'maturin'
        uses: thekevinscott/putitoutthere@v0
        with:
          command: write-version
          working_directory: ${{ matrix.path }}
          version: ${{ matrix.version }}

      # Two invocations: `maturin build --sdist` produces wheel AND sdist
      # (the flag is "also build sdist", not "only build sdist"), so the
      # sdist row would emit a wheel artifact that collides with the
      # per-target wheel rows at upload time. Use `command: sdist` for
      # the sdist row, which produces sdist-only.
      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.target == 'sdist'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ matrix.path }}
          command: sdist
          args: --out dist

      # #282: bundle_cli — cross-compile a Rust CLI per target and stage
      # it into the package source tree so maturin's [tool.maturin].include
      # glob picks it up as wheel data. Without these steps, wheels for
      # consumers who declare `[package.bundle_cli]` ship without the
      # binary and `pip install <pkg> && <pkg> ...` fails at runtime with
      # FileNotFoundError. Sdist row is excluded — sdists are source-only.
      #
      # Targets resolve to native runners via `defaultRunsOn` in
      # `src/plan.ts`, so cargo cross-compile linkers are not needed:
      # x86_64-linux on ubuntu-latest, aarch64-linux on ubuntu-24.04-arm,
      # darwin on macos-latest, windows on windows-latest. Rust is
      # pre-installed on all GHA runners; we only `rustup target add`
      # to make the triple known.
      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.bundle_cli && matrix.target != 'sdist'
        name: bundle_cli — add Rust target
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "$TARGET"

      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.bundle_cli && matrix.target != 'sdist'
        name: bundle_cli — cargo build for ${{ matrix.target }} (${{ matrix.bundle_cli.bin }})
        shell: bash
        working-directory: ${{ matrix.bundle_cli.crate_path }}
        env:
          TARGET: ${{ matrix.target }}
          BIN: ${{ matrix.bundle_cli.bin }}
          # #300: support the lib-with-optional-CLI shape (ruff/uv/
          # pydantic-core/biome/swc/dirsql) where the binary lives behind
          # `[[bin]] required-features = ["cli"]`. Empty `features` and
          # `no_default_features = false` (the schema defaults) leave the
          # cargo invocation byte-identical to its pre-#300 form.
          FEATURES: ${{ join(matrix.bundle_cli.features, ',') }}
          NO_DEFAULT_FEATURES: ${{ matrix.bundle_cli.no_default_features }}
        run: |
          set -euo pipefail
          args=(build --release --target "$TARGET" --bin "$BIN")
          if [ -n "$FEATURES" ]; then args+=(--features "$FEATURES"); fi
          if [ "$NO_DEFAULT_FEATURES" = "true" ]; then args+=(--no-default-features); fi
          cargo "${args[@]}"

      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.bundle_cli && matrix.target != 'sdist'
        name: bundle_cli — stage binary into ${{ matrix.path }}/${{ matrix.bundle_cli.stage_to }}
        shell: bash
        env:
          CRATE_PATH: ${{ matrix.bundle_cli.crate_path }}
          PKG_PATH: ${{ matrix.path }}
          STAGE_TO: ${{ matrix.bundle_cli.stage_to }}
          BIN: ${{ matrix.bundle_cli.bin }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then ext=".exe"; else ext=""; fi
          src="${CRATE_PATH}/target/${TARGET}/release/${BIN}${ext}"
          dst_dir="${PKG_PATH}/${STAGE_TO}"
          if [ ! -f "$src" ]; then
            echo "::error::cargo build did not produce ${src}"
            ls -la "${CRATE_PATH}/target/${TARGET}/release/" || true
            exit 1
          fi
          mkdir -p "$dst_dir"
          cp "$src" "$dst_dir/"
          echo "staged: $src -> $dst_dir/${BIN}${ext}"

      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.target != 'sdist'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ matrix.path }}
          command: build
          args: --release --out dist --target ${{ matrix.target }}

      # #282: wheel-content guard. Permanent defense-in-depth — the
      # produced wheel must contain the staged binary at <stage_to>/<bin>.
      # Catches the bug shape this issue tracks (no staging happened) and
      # any future regression where the cross-compile silently routes the
      # binary to the wrong path. Runs before upload-artifact, so a
      # broken wheel never leaves the build runner.
      #
      # Path-inside-wheel notes: maturin rewrites paths from the package
      # source root into the wheel's distribution layout. The exact path
      # depends on the consumer's pyproject layout (`python/<pkg>/...`
      # vs `src/<pkg>/...`), so we can't assert against a fully qualified
      # in-wheel path. We assert that *some* directory inside the wheel
      # ends in the consumer's `stage_to` and contains the named bin —
      # which is the strongest cross-layout assertion that still catches
      # "binary missing entirely."
      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.bundle_cli && matrix.target != 'sdist'
        name: bundle_cli — verify wheel contains ${{ matrix.bundle_cli.stage_to }}/${{ matrix.bundle_cli.bin }}
        shell: bash
        env:
          PKG_PATH: ${{ matrix.path }}
          STAGE_TO: ${{ matrix.bundle_cli.stage_to }}
          BIN: ${{ matrix.bundle_cli.bin }}
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then ext=".exe"; else ext=""; fi
          dist_dir="${PKG_PATH}/dist"
          wheel=$(find "$dist_dir" -maxdepth 1 -name '*.whl' -print -quit)
          if [ -z "${wheel:-}" ]; then
            echo "::error::no wheel produced under ${dist_dir}"
            exit 1
          fi
          # Strip leading ./ if present, accept any in-wheel directory
          # ending in <stage_to>'s suffix.
          stage_suffix="${STAGE_TO#./}"
          expected="${BIN}${ext}"
          if ! unzip -l "$wheel" | awk '{print $NF}' \
               | grep -qE "(^|/)${stage_suffix}/${expected}\$"; then
            echo "::error::wheel $(basename "$wheel") missing bundle_cli binary at ${stage_suffix}/${expected}"
            echo "wheel contents:"
            unzip -l "$wheel"
            exit 1
          fi
          echo "ok bundle_cli: ${stage_suffix}/${expected} present in $(basename "$wheel")"

      - if: matrix.kind == 'pypi' && matrix.build != 'maturin' && matrix.target == 'sdist'
        # hatch-vcs / setuptools-scm derive the version from the latest git
        # tag at build time — which is still the *previous* release at this
        # point. Feed the planned version through setuptools-scm's global
        # pretend-version env so the sdist filename matches what we're about
        # to publish. Per-package variants are silently ignored by hatch-vcs;
        # only the global one works.
        working-directory: ${{ matrix.path }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ matrix.version }}
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir dist

      # #324: pure-Python wheel for hatch/setuptools. Maturin emits per-
      # target wheels in its own step; this row only runs for the planner-
      # emitted `target: 'wheel-any'` row that exists when build != maturin.
      # Same SETUPTOOLS_SCM_PRETEND_VERSION shape as the sdist step above.
      - if: matrix.kind == 'pypi' && matrix.build != 'maturin' && matrix.target == 'wheel-any'
        working-directory: ${{ matrix.path }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ matrix.version }}
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir dist

      # ---- npm ----
      - if: matrix.kind == 'npm'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://registry.npmjs.org'

      - if: matrix.kind == 'npm'
        working-directory: ${{ matrix.path }}
        # Build matrix can target Windows runners; default shell there is
        # pwsh, but `if [ -f ... ]` is bash. Force bash for portability.
        #
        # Strict installs (`npm ci`, `pnpm install --frozen-lockfile`) self-
        # heal to their non-strict form on failure. Why: bundled-cli / napi
        # consumers declare `optionalDependencies` for `<name>-<triple>@<version>`
        # platform packages that this pipeline produces. On the first publish,
        # those entries 404 on the registry; pnpm 10 silently drops 404'd
        # optionals from the lockfile when it is regenerated locally, then
        # `--frozen-lockfile` refuses on the next CI run because the lockfile
        # and package.json disagree. The `::warning::` makes the fallback
        # visible in the run log so the consumer understands the recovery.
        # See README → Recipes → Bundled-CLI npm family.
        shell: bash
        env:
          # #287: bundled-cli / napi consumers' build scripts read TARGET
          # to know which triple to cross-compile and stage under
          # `build/<triple>/<bin>`. Multi-mode (napi + bundled-cli)
          # consumers also read BUILD so a single script can dispatch
          # on the mode. Vanilla / `target == 'main'` rows ignore both.
          # Mirrors what `e2e-fixture-job.yml` passes to the same step
          # for the `js-bundled-cli` / `js-napi` fixtures; without this
          # block, the reusable workflow's contract diverged from the
          # fixture and consumers' first publish produced empty
          # `build/<triple>/` artifacts.
          TARGET: ${{ matrix.target }}
          BUILD: ${{ matrix.build }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci || {
              echo "::warning::package-lock.json drift (likely 404 on platform-package optionalDependencies for a brand-new bundled-cli/napi family); falling back to npm install"
              npm install
            }
          elif [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm@9
            pnpm install --frozen-lockfile || {
              echo "::warning::pnpm-lock.yaml drift (likely 404 on platform-package optionalDependencies for a brand-new bundled-cli/napi family); falling back to pnpm install --no-frozen-lockfile"
              pnpm install --no-frozen-lockfile
            }
          else
            npm install
          fi
          npm run build --if-present

      # ---- crates ----
      # cargo publish builds on the registry side; no artifact needed
      # at build time. The publish job invokes cargo directly.

      - if: matrix.kind != 'crates'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
