name: Actionlint

# Lints every workflow file under .github/workflows/. Catches:
#   - Bad action references
#   - Expression syntax errors
#   - Job/step dependency typos
#   - Shell script issues inside `run:` blocks (via shellcheck)
#
# Workflow YAML drift is expensive to debug -- the feedback loop is
# push → wait for runner → wait for step. Lint locally first.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # `dist-action/index.js` is gitignored on main and only exists on
      # tag commits (release-npm.yml folds it into the release commit).
      # actionlint validates `runs.main` paths exist for any local action
      # referenced via `uses: ./` — without the bundle present, the
      # e2e-fixture workflow's `uses: ./` step trips the existence check.
      # Build the bundle here so actionlint sees what runtime sees.
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build action bundle
        run: pnpm run build:action

      - name: Run actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

      # Structural-safety invariant for the PR-time path
      # (issue #272 for build/_matrix; issue #317 for check). These
      # files must never grow `id-token: write` — that's what makes
      # it impossible for a PR-time invocation to inadvertently mint
      # an OIDC token capable of publishing. Any future patch that
      # adds OIDC there belongs in a new file on the publish path,
      # not these.
      - name: Assert PR-time path has no id-token permission
        run: |
          set -euo pipefail
          # Anchor at column 0 with optional indent so YAML declarations
          # (`  id-token: write`) match while in-comment mentions
          # (`# ... id-token: write ...`) do not. The constants in
          # this check are the names of the files that constitute the
          # PR-time path; do not generalise.
          violations=0
          for f in .github/workflows/build.yml .github/workflows/_matrix.yml .github/workflows/check.yml; do
            if grep -nE '^[[:space:]]+id-token[[:space:]]*:[[:space:]]*write' "$f"; then
              echo "::error file=$f::id-token: write is forbidden on the PR-time path (issues #272, #317)"
              violations=$((violations + 1))
            fi
          done
          if [ "$violations" -ne 0 ]; then
            exit 1
          fi
