name: E2E (CLI)

# Runs the node CLI e2e tier (tests/e2e/**/*.e2e.test.ts): vitest tests
# that shell out to the built CLI (a real `node` subprocess of the
# engine's bin) and hit the real registries, pointed at piot's own
# piot-fixture-zzz-* fixtures.
# Lighter than the fixture suite (e2e.yml): no publish happens, so it's
# reliable per-PR and its red->green is visible. See tests/e2e/README.md.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: e2e-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-cli:
    name: e2e (CLI, live registries)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-node

      - uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: CLI e2e against live registries
        run: pnpm test:e2e
