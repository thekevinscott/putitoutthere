name: Evidence check

# Enforces AGENTS.md's "Verification policy": new CHANGELOG.md bullets
# under ## Unreleased must cite machine-checked evidence, or explain why
# no fixture applies.

on:
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  check:
    name: Evidence check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enforce CHANGELOG evidence citations
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git diff --unified=0 "${BASE_SHA}" "${HEAD_SHA}" -- CHANGELOG.md > /tmp/changelog.diff

          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const { readFileSync } = require('node:fs');

          const baseSha = process.env.BASE_SHA;
          const headSha = process.env.HEAD_SHA;
          const repository = process.env.GITHUB_REPOSITORY;
          // Accepted citation buckets: e2e/, integration/, unit/, consumer-template/.
          const allowedBuckets = new Set(['e2e', 'integration', 'unit', 'consumer-template']);

          const changelog = readFileSync('CHANGELOG.md', 'utf8').split(/\r?\n/);
          const patch = readFileSync('/tmp/changelog.diff', 'utf8').split(/\r?\n/);

          function unreleasedLineRange() {
            const start = changelog.findIndex((line) => /^##\s+Unreleased\s*$/.test(line));
            if (start === -1) return null;
            const next = changelog.findIndex((line, index) => index > start && /^##\s+/.test(line));
            return { start: start + 1, end: next === -1 ? changelog.length + 1 : next + 1 };
          }

          function addedUnreleasedBullets() {
            const range = unreleasedLineRange();
            if (!range) return [];

            const bullets = [];
            let newLine = 0;

            for (const raw of patch) {
              const hunk = raw.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
              if (hunk) {
                newLine = Number(hunk[1]);
                continue;
              }

              if (raw.startsWith('+++') || raw.startsWith('---')) continue;

              if (raw.startsWith('+')) {
                const text = raw.slice(1);
                if (newLine >= range.start && newLine < range.end && /^\s*-\s+/.test(text)) {
                  bullets.push({ line: newLine, text });
                }
                newLine += 1;
                continue;
              }

              if (!raw.startsWith('-')) {
                newLine += 1;
              }
            }

            return bullets;
          }

          function ghApi(path) {
            return JSON.parse(
              execFileSync('gh', ['api', '-X', 'GET', path], {
                encoding: 'utf8',
                stdio: ['ignore', 'pipe', 'inherit'],
              }),
            );
          }

          let workflowRuns = null;
          const jobsByRun = new Map();

          function runsForHead() {
            if (workflowRuns) return workflowRuns;
            const encodedSha = encodeURIComponent(headSha);
            const response = ghApi(`repos/${repository}/actions/runs?head_sha=${encodedSha}&per_page=100`);
            workflowRuns = response.workflow_runs ?? [];
            return workflowRuns;
          }

          function jobsForRun(runId) {
            if (jobsByRun.has(runId)) return jobsByRun.get(runId);
            const response = ghApi(`repos/${repository}/actions/runs/${runId}/jobs?per_page=100`);
            const jobs = response.jobs ?? [];
            jobsByRun.set(runId, jobs);
            return jobs;
          }

          function normalize(value) {
            return String(value ?? '').toLowerCase().replace(/[^a-z0-9]+/g, '/').replace(/^\/|\/$/g, '');
          }

          function runMatches(run, citation) {
            const wanted = normalize(citation);
            const runFields = [run.name, run.display_title, run.path, run.event].map(normalize);
            if (runFields.some((field) => field.includes(wanted))) return true;

            return jobsForRun(run.id).some((job) => normalize(job.name).includes(wanted));
          }

          function passedEvidence(citation) {
            return runsForHead().some((run) => {
              if (run.status !== 'completed' || run.conclusion !== 'success') return false;
              return runMatches(run, citation);
            });
          }

          const failures = [];
          for (const bullet of addedUnreleasedBullets()) {
            const evidence = bullet.text.match(/\((verified by|no fixture):\s*([^)]+)\)\s*$/i);
            if (!evidence) {
              failures.push(`CHANGELOG.md:${bullet.line}: missing trailing '(verified by: ...)' or '(no fixture: ...)' clause`);
              continue;
            }

            const kind = evidence[1].toLowerCase();
            const value = evidence[2].trim();

            if (kind === 'no fixture') {
              if (!value || value === '<reason>') {
                failures.push(`CHANGELOG.md:${bullet.line}: '(no fixture: ...)' requires a non-empty reason`);
              }
              continue;
            }

            for (const citation of value.split(',').map((part) => part.trim()).filter(Boolean)) {
              const bucket = citation.split('/')[0];
              if (!allowedBuckets.has(bucket)) {
                failures.push(`CHANGELOG.md:${bullet.line}: unsupported evidence bucket '${bucket}' in '${citation}'`);
                continue;
              }

              if (!passedEvidence(citation)) {
                failures.push(`CHANGELOG.md:${bullet.line}: no successful GitHub Actions run or job matched '${citation}' on ${headSha}`);
              }
            }
          }

          if (failures.length > 0) {
            for (const failure of failures) {
              console.log(`::error::${failure}`);
            }
            process.exit(1);
          }

          console.log(`Evidence check passed for CHANGELOG.md additions between ${baseSha} and ${headSha}.`);
          NODE
