name: Evidence check

# Enforces AGENTS.md's "Verification policy": new CHANGELOG.md bullets
# under ## Unreleased must cite machine-checked evidence, or explain why
# no fixture applies.
#
# The decision logic lives in the tested, I/O-free `checkEvidence`
# orchestrator under `src/ci/evidence-check/` (unit + integration
# covered). This job builds it and runs the thin boundary
# `.github/workflows/evidence-check.mjs`, which supplies the real
# git-diff / `gh api` / sleep / clock dependencies.

on:
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  check:
    name: Evidence check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build engine
        run: pnpm build

      - name: Enforce CHANGELOG evidence citations
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: node .github/workflows/evidence-check.mjs
