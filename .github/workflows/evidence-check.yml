name: Evidence check

# Enforces AGENTS.md's "Verification policy": new CHANGELOG.md bullets under
# ## Unreleased must cite machine-checked evidence, or explain why no fixture
# applies.
#
# The gate logic lives in tested TypeScript (`packages/ci/src/evidence-check/`,
# the `piot-ci evidence-check` command), not inline bash — see AGENTS.md >
# "Repo-internal CI gates" (#445, epic #442).

on:
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  check:
    name: Evidence check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        # packages/ci's `prepare` script builds its dist during install, so
        # `piot-ci` is linked into node_modules/.bin and resolvable below.
        run: pnpm install --frozen-lockfile

      - name: Enforce CHANGELOG evidence citations
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # `piot-ci evidence-check` calls `gh api` to inspect cited workflow
          # runs; GH_TOKEN authenticates it (unauthenticated calls rate-limit).
          GH_TOKEN: ${{ github.token }}
        run: pnpm exec piot-ci evidence-check
