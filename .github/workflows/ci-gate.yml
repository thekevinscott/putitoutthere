name: CI Gate

# Aggregator check that turns green when every other check on this PR
# has completed without failure. It covers the fast checks and the
# path-filtered ones (actionlint, link-check) that can't be required
# individually.
#
# NOT a sufficient sole gate. pr-monitor's poll loop only re-fetches the
# check list while something is in progress, so heavier jobs that
# register after the fast wave drains (integration, e2e, the fixture
# matrix) can be missed and CI Gate goes green anyway (#417). Branch
# protection must ALSO require those contexts explicitly -- see
# .github/BRANCH_PROTECTION.md.
#
# Mirrors dirsql's pr-monitor pattern.

on:
  pull_request:

permissions:
  checks: read

jobs:
  monitor:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: thekevinscott/pr-monitor@v1
        with:
          job-name: CI Gate
          # pr-monitor's default cap is 10 minutes; the full suite
          # (e2e fixtures + TestPyPI publish) runs ~10m, so the default
          # times out before the last job reports. Give it headroom.
          timeout: '20'
