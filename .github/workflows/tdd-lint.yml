name: TDD Lint

# Enforces the red/green TDD discipline from plan.md §23.7: PRs that
# modify src/ must also touch at least one *.test.ts file. CI rejects
# non-test-bearing PRs.
#
# Escape hatch: a commit in the PR range with a `Skip-Gates: <reason>`
# trailer bypasses this check. The trailer is visible in the PR commit
# list, so reviewers can push back if it's abused. See notes/gates.md.
#
# The gate logic lives in tested TypeScript (`packages/ci/src/tdd-lint/`,
# the `piot-ci tdd-lint` command), not inline bash — see AGENTS.md >
# "Repo-internal CI gates" (#452, epic #442).

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: tdd-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  require-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        # packages/ci's `prepare` script builds its dist during install, so
        # `piot-ci` is linked into node_modules/.bin and resolvable below.
        run: pnpm install --frozen-lockfile

      - name: Enforce red/green TDD discipline
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: pnpm exec piot-ci tdd-lint
