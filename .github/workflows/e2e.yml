name: E2E

# E2E tests publish to the piot-fixture-zzz-* canary family on
# real registries (npm, PyPI, crates.io). `canaryVersion()` emits
# monotonic 0.0.{unix_seconds} slots so runs never collide on the
# immutable crates.io publish rule.
#
# Triggers:
# - push to main → publish for real (continuous dogfood).
# - pull_request → dry-run only (no side effects).
# - workflow_dispatch → operator choice; defaults to dry-run.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: "Actually publish canary versions to real registries"
        type: boolean
        default: false

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: e2e
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Trusted Publishing / OIDC:
      # - npm: putitoutthere's npm handler auto-detects OIDC via
      #   ACTIONS_ID_TOKEN_REQUEST_TOKEN and adds --provenance. NPM_TOKEN
      #   fallback stays wired up for the initial canary-family publish
      #   (npm trusted publishing requires the package to exist first).
      # - PyPI: pending publisher registered on pypi.org claims the
      #   canary name on first publish. No PYPI_API_TOKEN needed once
      #   the pending publisher is live.
      # - crates.io: rust-lang/crates-io-auth-action@v1 exchanges the
      #   OIDC JWT for a short-lived CARGO_REGISTRY_TOKEN. The token
      #   fallback stays wired up for the first canary publish (crates.io
      #   trusted publishing requires crate ownership, i.e. an existing
      #   crate).
      - name: Decide publish mode
        id: mode
        # push to main      → publish=1 (live canary).
        # pull_request      → publish=0 (dry-run; no registry side effects).
        # workflow_dispatch → publish=inputs.publish (default false).
        # "Re-run failed jobs" preserves the original event, so a re-run of a
        # push-triggered failure stays publish=1. A fresh UI dispatch with
        # defaults does NOT publish — toggle the input to true for that.
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.publish }}" = "true" ]; then
            echo "publish=1" >> "$GITHUB_OUTPUT"
          else
            echo "publish=0" >> "$GITHUB_OUTPUT"
          fi

      - name: crates.io OIDC token exchange
        if: steps.mode.outputs.publish == '1'
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-auth
        continue-on-error: true

      - name: Run e2e suite
        env:
          PIOT_E2E_PUBLISH: ${{ steps.mode.outputs.publish }}
          # npm: OIDC auto-detected; token fallback for bootstrap.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # PyPI: via pending publisher; token fallback if needed.
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          # crates: prefer OIDC short-lived token; fall back to long-lived
          # when the OIDC step didn't succeed (pre-bootstrap: no trusted
          # publishing config on the crate yet → step errors → fall back).
          CARGO_REGISTRY_TOKEN: ${{ (steps.crates-auth.outcome == 'success' && steps.crates-auth.outputs.token) || secrets.CARGO_REGISTRY_TOKEN }}
        run: pnpm run test:e2e
