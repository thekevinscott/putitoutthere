name: E2E

# Canary E2E. Publishes to the `piot-fixture-zzz-cli` npm package
# (purpose-built for this; throwaway 0.0.{unix_seconds} versions) on
# every PR and every push to main, via OIDC trusted publishing.
#
# Why publish on PRs and not just on main: catching publish-side
# breakage post-merge (release-npm.yml run 24972181242 — ENEEDAUTH
# from `npm publish --provenance`) is too late. The bug is already
# in `main` by the time we find out. Running the live publish on PR
# CI shifts that detection left so a broken OIDC path blocks the
# merge instead of breaking the next real release.
#
# Triggers:
# - pull_request           → live canary publish.
# - push to main           → live canary publish (continuous dogfood).
# - workflow_dispatch      → live canary publish unless caller passes
#                            `publish: false` to opt out.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish canary version to npm (uncheck for dry-run only)"
        type: boolean
        default: true

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: e2e
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Decide publish mode
        id: mode
        # pull_request / push → publish=1.
        # workflow_dispatch   → publish=inputs.publish (default true).
        # `inputs.publish` is unset on non-dispatch events, so the
        # `!= 'false'` check defaults to publish=1 for those.
        run: |
          if [ "${{ inputs.publish }}" = "false" ]; then
            echo "publish=0" >> "$GITHUB_OUTPUT"
          else
            echo "publish=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Run e2e suite
        env:
          PIOT_E2E_PUBLISH: ${{ steps.mode.outputs.publish }}
          # No long-lived registry tokens. npm OIDC trusted publishing
          # is the only auth path the canary exercises — matches what
          # the public reusable workflow does.
        run: pnpm run test:e2e
