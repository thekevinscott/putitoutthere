name: E2E

# E2E tests hit real registries (TestPyPI, putitoutthere-canary on npm/crates.io)
# and are deliberately NOT run on every push -- per plan.md §23.4 they
# exist to be run by the agent during development. This workflow is
# workflow_dispatch-only so the runner is available but won't flake CI.
#
# Full harness + canary account setup: #28.

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run e2e suite
        run: pnpm run test:e2e
