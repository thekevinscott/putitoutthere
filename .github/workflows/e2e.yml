name: E2E

# Per-fixture e2e matrix. One job per distinct publish-path
# manifestation; each fixture entry runs the SAME job graph the
# consumer-facing reusable workflow runs (.github/workflows/release.yml)
# against the fixture's working tree, end-to-end against real
# registries via OIDC trusted publishing.
#
# The mechanics live in .github/workflows/e2e-fixture.yml so the
# matrix here is just the fixture list. e2e-fixture.yml is a copy of
# release.yml's plan → build → publish job graph with one extra step:
# materializing the fixture into fixture-tree/ before the plan runs.
#
# Until trusted publishers are registered for each fixture's package
# names (#244 step 2), the corresponding job fails — by design. The
# failure is the signal that the publisher still needs to be wired.
#
# Triggers:
# - pull_request           → live publish per fixture.
# - push to main           → live publish per fixture.
# - workflow_dispatch      → live publish per fixture.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    name: e2e (${{ matrix.fixture }})
    # Permissions on a reusable-workflow call set the GITHUB_TOKEN scope
    # for the called workflow. e2e-fixture.yml's publish job needs
    # id-token: write (OIDC mint) and contents: write (tag push); both
    # have to be granted here at the caller level.
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - js-vanilla
          - js-napi
          - js-bundled-cli
          - js-python-no-rust
          - python-pure-hatch
          - python-pure-sdist-only
          - python-rust-maturin
          - polyglot-everything
    uses: ./.github/workflows/e2e-fixture.yml
    secrets: inherit
    with:
      fixture: ${{ matrix.fixture }}

  # Caller-side PyPI upload — mirrors what consumers paste into their own
  # release.yml under the canonical template. Lives at the top level (not
  # inside the reusable e2e-fixture.yml) because pypa/gh-action-pypi-publish
  # blanket-aborts when invoked from inside a reusable workflow (PyPA
  # explicitly unsupported; warehouse#11096). The audit doc captures
  # the full reasoning:
  # notes/audits/2026-04-28-pypi-tp-reusable-workflow-constraint.md.
  #
  # Each fixture's PyPI project must have a Trusted Publisher registered
  # against `thekevinscott/putitoutthere/.github/workflows/e2e.yml` for
  # this to succeed. Failures here when TPs are missing are by design —
  # the failure is the signal to register the publisher.
  pypi-publish:
    needs: e2e
    runs-on: ubuntu-latest
    # Mirror e2e-fixture.yml's publish job: PyPI TPs registered with
    # an environment require it on the OIDC `sub` claim. Without this,
    # the mint exchange returns 422 invalid-publisher even when the
    # workflow_filename + repo claims match.
    environment: e2e
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: '*-sdist'
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: '*-wheel-*'
          path: dist/
          merge-multiple: true
      # Skip when no PyPI artifacts were produced — non-PyPI fixtures
      # leave dist/ empty, and pypa errors on an empty packages-dir.
      - id: have-pypi
        run: |
          if [ -n "$(ls -A dist/ 2>/dev/null)" ]; then
            echo "have_pypi=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_pypi=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.have-pypi.outputs.have_pypi == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent re-runs: if a fixture's version already exists
          # on PyPI from a previous e2e run, skip it cleanly instead
          # of failing.
          skip-existing: true
