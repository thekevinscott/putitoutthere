name: E2E

# E2E tests publish to the piot-fixture-zzz-* canary family on
# real registries (npm, PyPI, crates.io). Gated to workflow_dispatch
# only: they cost real API calls, produce real artifacts, and are meant
# to be run manually when we want to verify end-to-end.
#
# Default dispatch: dry-run only (no actual publishing).
# Set `publish=true` in the dispatch UI to flip PIOT_E2E_PUBLISH=1 and
# publish for real. See test/e2e/README.md.

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Actually publish canary versions to real registries"
        type: boolean
        default: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: e2e
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Trusted Publishing / OIDC:
      # - npm: putitoutthere's npm handler auto-detects OIDC via
      #   ACTIONS_ID_TOKEN_REQUEST_TOKEN and adds --provenance. NPM_TOKEN
      #   fallback stays wired up for the initial canary-family publish
      #   (npm trusted publishing requires the package to exist first).
      # - PyPI: pending publisher registered on pypi.org claims the
      #   canary name on first publish. No PYPI_API_TOKEN needed once
      #   the pending publisher is live.
      # - crates.io: rust-lang/crates-io-auth-action@v1 exchanges the
      #   OIDC JWT for a short-lived CARGO_REGISTRY_TOKEN. The token
      #   fallback stays wired up for the first canary publish (crates.io
      #   trusted publishing requires crate ownership, i.e. an existing
      #   crate).
      - name: crates.io OIDC token exchange
        if: inputs.publish
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-auth
        continue-on-error: true

      - name: Run e2e suite
        env:
          PIOT_E2E_PUBLISH: ${{ inputs.publish && '1' || '0' }}
          # npm: OIDC auto-detected; token fallback for bootstrap.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # PyPI: via pending publisher; token fallback if needed.
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          # crates: prefer OIDC short-lived token; fall back to long-lived.
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
        run: pnpm run test:e2e
