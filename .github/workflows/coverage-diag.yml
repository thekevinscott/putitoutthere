name: Coverage Diagnostic (temporary)

# TEMPORARY diagnostic (#476 gate-4). The unit-coverage gate reports a
# deterministic 99.94% branches / 99.96% statements in CI only; the engine is
# 100% by every local reproduction (exact Node, deps, command, env, scan path,
# shuffle). This workflow prints CI-side coverage with the `text` reporter so
# the exact uncovered branch shows in the job log, then it is deleted. Every
# step is pure wiring — a command invocation, no inline logic.

on:
  pull_request:
    branches: [main]

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # vitest's mapper, gate-matching scope (src tests only, coverage over
      # src/**/*.ts, only *.d.ts excluded), `text` reporter so the coverage
      # table — including the "Uncovered Line #s" column for any file below
      # 100% — is printed to the job log. No thresholds in the base config, so
      # this always exits 0 and prints even at <100%.
      - name: vitest coverage — gate scope, text report to log
        continue-on-error: true
        working-directory: packages/engine
        run: >-
          pnpm exec vitest run --coverage
          --coverage.include='src/**/*.ts'
          --coverage.exclude='src/**/*.d.ts'
          --coverage.reporter=text
          --coverage.reporter=text-summary
          --coverage.skipFull=false
          src
