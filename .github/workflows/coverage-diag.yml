name: Coverage Diagnostic (temporary)

# TEMPORARY diagnostic (#476 gate-4). The unit-coverage gate reports a
# deterministic 99.94% branches / 99.96% statements in CI only; the engine is
# 100% by every local reproduction (exact Node, deps, command, env, scan path,
# shuffle). This workflow captures CI-side coverage so the exact uncovered
# branch can be identified, then it is deleted. Every step is pure wiring — a
# command invocation plus artifact upload, no inline logic.

on:
  pull_request:
    branches: [main]

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # (a) vitest's own mapper, gate-matching scope (src tests only, coverage
      # over src/**/*.ts, only *.d.ts excluded), with reporters that list the
      # uncovered lines. No thresholds in the base config, so this always exits
      # 0 and writes the report even at <100%.
      - name: vitest coverage — gate-matching scope
        continue-on-error: true
        working-directory: packages/engine
        run: >-
          pnpm exec vitest run --coverage
          --coverage.include='src/**/*.ts'
          --coverage.exclude='src/**/*.d.ts'
          --coverage.reporter=json
          --coverage.reporter=json-summary
          --coverage.reporter=html
          --coverage.reportsDirectory=coverage-gate-diag
          src

      # (b) the gate itself, with raw V8 coverage captured so its own
      # ast-v8-to-istanbul mapping can be reproduced locally against the exact
      # CI-collected profiles.
      - name: gate raw V8 coverage
        continue-on-error: true
        env:
          NODE_V8_COVERAGE: ${{ github.workspace }}/gate-v8cov
        run: npx -y testing-conventions unit coverage --language typescript --config testing-conventions.toml packages/engine/src

      - name: Upload vitest gate-diag coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-gate-diag
          path: packages/engine/coverage-gate-diag/
          retention-days: 3

      - name: Upload gate raw V8 coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gate-v8cov
          path: gate-v8cov/
          retention-days: 3
