name: Coverage

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # vitest is configured with 90% thresholds in vitest.config.ts.
      # The command exits non-zero when any of lines/statements/branches/
      # functions drops below the configured threshold, which fails this job.
      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/
          retention-days: 7
