name: Changelog check

# Enforces AGENTS.md's "Changelog and migration policy": every PR that
# touches public-surface files must update both CHANGELOG.md and
# MIGRATIONS.md. Opt out per-PR by adding a commit with a
# `skip-changelog:` trailer (any value).
#
# The gate logic lives in tested TypeScript (`packages/ci/src/changelog-check/`,
# the `piot-ci changelog-check` command), not inline bash — see AGENTS.md
# > "Repo-internal CI gates" (#452, epic #442).

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Changelog check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        # packages/ci's `prepare` script builds its dist during install, so
        # `piot-ci` is linked into node_modules/.bin and resolvable below.
        run: pnpm install --frozen-lockfile

      - name: Enforce changelog + migration entry
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: pnpm exec piot-ci changelog-check
