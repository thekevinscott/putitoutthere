name: Release (dogfood)

# putitoutthere releases itself using itself.
#
# On push to main OR manual dispatch:
#   1. `putitoutthere plan` against the committed putitoutthere.toml
#      + the current HEAD trailer, emit matrix JSON to GITHUB_OUTPUT.
#   2. If the plan is non-empty, the publish job rebuilds the ncc
#      action bundle, folds it into a release-only commit (the bundle
#      is gitignored on main and lives only on tag commits), then
#      `putitoutthere publish` does the npm publish, writeVersion,
#      and tagging — tag points at the bundle-bearing commit.
#   3. The floating `v<major>` tag is moved to the new release commit
#      so scaffolded consumer workflows (`uses: ...@v1`) resolve to a
#      ref that has `dist-action/index.js` under it.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm run build

      - id: plan
        name: putitoutthere plan
        run: node dist/cli-bin.js plan --json > plan.json
      - name: expose matrix
        run: |
          # shellcheck disable=SC2002
          printf 'matrix=%s\n' "$(cat plan.json)" >> "$GITHUB_OUTPUT"
          echo "Plan:"
          # shellcheck disable=SC2002
          cat plan.json | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const m=JSON.parse(d);console.log(m.length? m.map(r=>' - '+r.name+'@'+r.version+' ('+r.target+')').join('\n') : '(nothing to release)');})"

  publish:
    needs: plan
    if: fromJSON(needs.plan.outputs.matrix || '[]')[0] != null
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm run build

      - name: Rebuild action bundle
        run: pnpm run build:action

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # `dist-action/` is gitignored on main; the action bundle exists only on
      # tag commits. Fold the freshly-built bundle into a release-only commit
      # so the per-package tag (and the floating `v<major>` tag that tracks
      # it) resolve to a commit that contains `dist-action/index.js`. The
      # commit is not pushed to main — it lives only as the tag's target.
      # See notes/handoff/2026-04-24-dist-action.md.
      - name: Fold action bundle into release commit
        run: |
          set -euo pipefail
          git add -f dist-action/
          if git diff --cached --quiet; then
            echo "No bundle changes to commit (unexpected — build:action should have produced output)." >&2
            exit 1
          fi
          git commit -m "chore(release): bundle action"

      - name: putitoutthere publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node dist/cli-bin.js publish

      # Scaffolded workflows reference `thekevinscott/putitoutthere@v<major>`
      # (community GitHub Actions convention, e.g. actions/checkout@v4). The
      # canonical per-release tag is `putitoutthere-v<x.y.z>`; this step keeps
      # a floating `v<major>` tag pointing at the latest release in the major
      # line so the scaffold resolves. Idempotent: re-runs are a no-op when
      # the floating tag already matches the latest release. Issue #199.
      - name: Move floating major tag
        run: |
          set -euo pipefail
          git fetch --tags --force origin
          latest=$(git tag --list 'putitoutthere-v*' | sort -V | tail -n1 || true)
          if [ -z "$latest" ]; then
            echo "No putitoutthere-v* tags yet; nothing to track."
            exit 0
          fi
          version="${latest#putitoutthere-v}"
          major="${version%%.*}"
          floating="v${major}"
          target=$(git rev-parse "${latest}^{commit}")
          current=$(git rev-parse --verify --quiet "refs/tags/${floating}^{commit}" || true)
          if [ "${current}" = "${target}" ]; then
            echo "Floating tag ${floating} already at ${latest}; no update."
            exit 0
          fi
          echo "Moving floating tag ${floating} -> ${target} (latest release ${latest})"
          git tag -f "${floating}" "${target}"
          git push --force origin "refs/tags/${floating}"
