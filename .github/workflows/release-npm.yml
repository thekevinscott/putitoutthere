name: Release to npm

# Triggered by pushing a tag matching v*.*.* to main. Builds, verifies,
# then publishes to npm using NPM_TOKEN. A single tag produces a single
# npm publish; re-running on the same tag is a no-op (npm rejects
# republish of an existing version -- that's fine).
#
# Pre-release of putitoutthere itself is manual. Once the self-hosting
# `putitoutthere publish` command lands (see #22), this workflow is
# replaced by the tool releasing itself.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g., v0.0.1)'
        required: true

concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck + lint + tests + coverage
        run: |
          pnpm run typecheck
          pnpm run lint
          pnpm run test:unit:coverage

      - name: Build SDK (dist/)
        run: pnpm run build

      # Sanity: dist-action/ committed to main must match the current
      # src/action.ts. If it doesn't, the action is silently broken and
      # we should not ship.
      - name: Verify dist-action/ is in sync
        run: |
          pnpm run build:action
          if ! git diff --exit-code dist-action/; then
            echo "::error::dist-action/ is out of date for this tag."
            exit 1
          fi

      # Confirm the tag's version matches package.json. Releases that
      # forgot to bump package.json would otherwise silently publish the
      # wrong version or collide with an existing one.
      - name: Check tag matches package.json version
        env:
          REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          tag_version="${REF#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::tag ${REF} does not match package.json version ${pkg_version}"
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
