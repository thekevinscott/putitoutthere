name: Release (dogfood)

# putitoutthere releases itself using itself.
#
# On push to main OR manual dispatch:
#   1. `putitoutthere plan` against the committed putitoutthere.toml
#      + the current HEAD trailer, emit matrix JSON to GITHUB_OUTPUT.
#   2. If the plan is non-empty, the publish job rebuilds the ncc
#      action bundle, folds it into a release-only commit (the bundle
#      is gitignored on main and lives only on tag commits), then
#      `putitoutthere publish` does the npm publish, writeVersion,
#      and tagging — tag points at the bundle-bearing commit.
#   3. The floating `v<major>` tag is moved to the new release commit
#      so scaffolded consumer workflows (`uses: ...@v1`) resolve to a
#      ref that has `dist-action/index.js` under it.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm run build

      - id: plan
        name: putitoutthere plan
        run: pnpm exec putitoutthere plan --json > plan.json
      - name: expose matrix
        run: |
          # #412: plan --json is now { matrix, verdicts, skew }; the matrix
          # output stays the bare array the publish gate + build consume.
          # shellcheck disable=SC2002
          printf 'matrix=%s\n' "$(cat plan.json | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>process.stdout.write(JSON.stringify(JSON.parse(d).matrix)))")" >> "$GITHUB_OUTPUT"
          echo "Plan:"
          # shellcheck disable=SC2002
          cat plan.json | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const m=JSON.parse(d).matrix;console.log(m.length? m.map(r=>' - '+r.name+'@'+r.version+' ('+r.target+')').join('\n') : '(nothing to release)');})"

  publish:
    needs: plan
    if: fromJSON(needs.plan.outputs.matrix || '[]')[0] != null
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm run build

      - name: Rebuild action bundle
        run: pnpm run build:action

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # `dist-action/` is gitignored on main; the action bundle exists only on
      # tag commits. Fold the freshly-built bundle into a release-only commit
      # so the per-package tag (and the floating `v<major>` tag that tracks
      # it) resolve to a commit that contains `dist-action/index.js`. The
      # commit is not pushed to main — it lives only as the tag's target.
      #
      # The stage / empty-index guard / trailer-forwarding commit — and the
      # reason the parent body must survive (else the publish-time plan
      # re-derivation silently downgrades `release: minor` to a patch; the
      # 0.1.51 → 0.2.0 attempt that landed as 0.1.52) — now live in the
      # `fold-bundle` engine command as tested code (`src/fold-action-bundle.ts`),
      # not inline bash. See notes/handoff/2026-04-24-dist-action.md.
      - name: Fold action bundle into release commit
        run: |
          pnpm exec putitoutthere fold-bundle --subject 'chore(release): bundle action'

      - name: putitoutthere publish
        env:
          # The repository-visibility preflight check calls the GitHub
          # API; an authenticated call gets 5000 req/hr instead of the
          # unauthenticated 60, so a busy runner never rate-limits.
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm exec putitoutthere publish

      # Scaffolded workflows reference `thekevinscott/putitoutthere@v<major>`
      # (community GitHub Actions convention, e.g. actions/checkout@v4). The
      # canonical per-release tag is `putitoutthere-v<x.y.z>`; this step keeps
      # a floating `v<major>` tag pointing at the latest release in the major
      # line so the scaffold resolves. Idempotent: re-runs are a no-op when
      # the floating tag already matches the latest release. Issue #199.
      #
      # The force-fetch / latest-release lookup / idempotency / force-move
      # now live in the `advance-floating-major` engine command as tested
      # code (`src/advance-floating-major.ts`), sharing `forceMoveTag` with
      # `advance-v0` so the two floating-tag movers can't diverge.
      - name: Move floating major tag
        run: pnpm exec putitoutthere advance-floating-major
