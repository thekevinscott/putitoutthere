name: putitoutthere release

# Reusable workflow for publishing to crates.io, PyPI, and npm.
#
# Consumer integration (their own .github/workflows/release.yml):
#
#   on:
#     push: { branches: [main] }
#
#   jobs:
#     release:
#       uses: thekevinscott/putitoutthere/.github/workflows/release.yml@v0
#       permissions:
#         contents: write
#         id-token: write
#
# That is the entire surface a consumer touches. `putitoutthere.toml`
# at the repo root is the config; nothing about that is configurable.
#
# Auth: OIDC trusted publishers on all three registries (crates.io,
# PyPI, npm). Long-lived registry tokens are explicitly NOT supported
# via this workflow — register a trusted publisher per registry once,
# then publishes are zero-secret. See docs/guide/auth.md.
#
# The `uses: thekevinscott/putitoutthere@v0` calls inside this file
# resolve to the same git ref the workflow itself was loaded from, so
# the workflow + engine always agree on a single version.

on:
  workflow_call:
    inputs:
      environment:
        description: >-
          GitHub deployment environment to gate the publish job. Required-
          reviewers + secret scoping are configured per-environment in the
          consumer's repo settings. Default `release`.
        type: string
        default: 'release'
      node_version:
        description: >-
          Node version for plan / publish runners and for kind = "npm"
          build steps. Default `24`.
        type: string
        default: '24'
      python_version:
        description: >-
          Python version for kind = "pypi" build steps. Default `3.12`.
        type: string
        default: '3.12'
    outputs:
      has_pypi:
        description: >-
          `'true'` when the planned matrix contains any pypi rows. Consumers
          gate their caller-side `pypi-publish` job on this so npm/crates-only
          repos don't need the extra job. PyPI uploads run in the caller's
          workflow context (not this reusable workflow) — see
          README → "Publishing to PyPI". Always a string ("true"/"false")
          per `workflow_call` output rules.
        value: ${{ jobs.plan.outputs.has_pypi }}

concurrency:
  group: putitoutthere-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_pypi: ${{ steps.has-pypi.outputs.has_pypi }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - id: plan
        uses: thekevinscott/putitoutthere@v0
        with:
          command: plan

      # Compute a boolean "has_pypi" the consumer can gate their
      # caller-side pypi-publish job on. PyPI uploads run in the
      # caller's workflow context (not this reusable workflow) per
      # the warehouse#11096 architectural constraint — see
      # notes/audits/2026-04-28-pypi-tp-reusable-workflow-constraint.md.
      - id: has-pypi
        env:
          MATRIX: ${{ steps.plan.outputs.matrix }}
        run: |
          set -euo pipefail
          # Bash-safe substring check; the matrix is a JSON array of
          # objects each carrying a `kind` field.
          if printf '%s' "${MATRIX:-}" | grep -q '"kind":"pypi"'; then
            echo "has_pypi=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pypi=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: plan
    if: fromJSON(needs.plan.outputs.matrix || '[]')[0] != null
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ---- pypi ----
      - if: matrix.kind == 'pypi'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      # Two invocations: `maturin build --sdist` produces wheel AND sdist
      # (the flag is "also build sdist", not "only build sdist"), so the
      # sdist row would emit a wheel artifact that collides with the
      # per-target wheel rows at upload time. Use `command: sdist` for
      # the sdist row, which produces sdist-only.
      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.target == 'sdist'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ matrix.path }}
          command: sdist
          args: --out dist

      - if: matrix.kind == 'pypi' && matrix.build == 'maturin' && matrix.target != 'sdist'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ matrix.path }}
          command: build
          args: --release --out dist --target ${{ matrix.target }}

      - if: matrix.kind == 'pypi' && matrix.build != 'maturin' && matrix.target == 'sdist'
        # hatch-vcs / setuptools-scm derive the version from the latest git
        # tag at build time — which is still the *previous* release at this
        # point. Feed the planned version through setuptools-scm's global
        # pretend-version env so the sdist filename matches what we're about
        # to publish. Per-package variants are silently ignored by hatch-vcs;
        # only the global one works.
        working-directory: ${{ matrix.path }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ matrix.version }}
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir dist

      # ---- npm ----
      - if: matrix.kind == 'npm'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://registry.npmjs.org'

      - if: matrix.kind == 'npm'
        working-directory: ${{ matrix.path }}
        # Build matrix can target Windows runners; default shell there is
        # pwsh, but `if [ -f ... ]` is bash. Force bash for portability.
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm@9
            pnpm install --frozen-lockfile
          else
            npm install
          fi
          npm run build --if-present

      # ---- crates ----
      # cargo publish builds on the registry side; no artifact needed
      # at build time. The publish job invokes cargo directly.

      - if: matrix.kind != 'crates'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  publish:
    needs: [plan, build]
    if: fromJSON(needs.plan.outputs.matrix || '[]')[0] != null
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://registry.npmjs.org'

      # PyPI: the upload step is owned by the caller's `pypi-publish`
      # job (see README → "Publishing to PyPI"). The engine's role
      # here is plan + build artifact discovery + version-rewrite +
      # tag creation; no twine, no setup-python.

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Configure git identity for tagging
        # Annotated tags require committer identity; hosted runners have
        # none by default.
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # crates.io OIDC trusted publisher exchange: ID-token -> short-
      # lived CARGO_REGISTRY_TOKEN. Only fires when the plan contains a
      # crates row; pure JS/Python repos skip the action entirely so
      # they don't need a configured trusted publisher on crates.io.
      - name: Authenticate with crates.io (OIDC)
        if: contains(needs.plan.outputs.matrix, '"kind":"crates"')
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Export CARGO_REGISTRY_TOKEN
        if: steps.crates-auth.outcome == 'success'
        env:
          CRATES_IO_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: echo "CARGO_REGISTRY_TOKEN=$CRATES_IO_TOKEN" >> "$GITHUB_ENV"

      - uses: thekevinscott/putitoutthere@v0
        with:
          command: publish

      # The engine creates annotated git tags + pushes to PyPI / npm /
      # crates.io but does NOT cut GitHub Releases. Backfill that here so
      # the project's /releases page tracks the tag history. Auto-generated
      # notes pull PR titles between this tag and the previous one.
      - name: Create GitHub Release(s) for new tag(s)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          new_tags=$(git tag --points-at HEAD)
          if [ -z "$new_tags" ]; then
            echo "No tags on HEAD; nothing to release on GitHub."
            exit 0
          fi
          for tag in $new_tags; do
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "GitHub Release $tag already exists; skipping."
              continue
            fi
            gh release create "$tag" --title "$tag" --generate-notes
            echo "Created GitHub Release for $tag"
          done
