name: putitoutthere release

# Reusable workflow for publishing to crates.io, PyPI, and npm.
#
# Consumer integration (their own .github/workflows/release.yml):
#
#   on:
#     push: { branches: [main] }
#
#   jobs:
#     release:
#       uses: thekevinscott/putitoutthere/.github/workflows/release.yml@v0
#       permissions:
#         contents: write
#         id-token: write
#
# That is the entire surface a consumer touches. `putitoutthere.toml`
# at the repo root is the config; nothing about that is configurable.
#
# Auth: OIDC trusted publishers on all three registries (crates.io,
# PyPI, npm) are the default and recommended path. Trusted Publishing
# binds to an *already-published* package on crates.io and npm, so the
# very first publish has no OIDC path available; callers can pass a
# long-lived `CARGO_REGISTRY_TOKEN` (crates.io) or `NPM_TOKEN` (npm)
# via `secrets:` and the OIDC exchange is skipped when present. See
# README → "Trusted publishers".
#
# This file delegates the plan + build matrix to `_matrix.yml`
# (`uses: thekevinscott/putitoutthere/.github/workflows/_matrix.yml@v0`)
# so the same matrix runs on PR-time `build.yml` invocations and at
# release time. The `publish` job below is the only piece that lives
# in this file — keeping it isolated to the release path is what makes
# `build.yml` a structural-not-runtime guarantee against accidental
# publishes (publish-capable bytes simply do not exist there).
#
# The `uses: thekevinscott/putitoutthere@v0` calls inside this file
# (and inside `_matrix.yml`) resolve to the same git ref the workflow
# itself was loaded from, so the workflow + engine always agree on a
# single version.

on:
  workflow_call:
    inputs:
      environment:
        description: >-
          GitHub deployment environment to gate the publish job. Required-
          reviewers + secret scoping are configured per-environment in the
          consumer's repo settings. Default `release`.
        type: string
        default: 'release'
      node_version:
        description: >-
          Node version for plan / publish runners and for kind = "npm"
          build steps. Default `24`.
        type: string
        default: '24'
      python_version:
        description: >-
          Deprecated (#369): `kind = "pypi"` builds now fan across the
          Python versions inferred from each package's
          `requires-python` (or pinned via `python_versions` in
          `putitoutthere.toml`). This input no longer affects pypi
          builds; it is retained only so existing callers don't break.
        type: string
        default: '3.12'
      release_packages:
        description: >-
          Manual release. Comma-separated `name[@<bump|version>]`
          entries — e.g. `lib-core@minor, lib-py@1.4.0, lib-js`. Each
          entry is a package name optionally suffixed with
          `@<patch|minor|major>` or an explicit `@<X.Y.Z>` semver; a
          bare name defaults to a patch bump. When set, change
          detection is bypassed and exactly the named packages are
          released. Wire this to a `workflow_dispatch` input in your
          caller workflow to re-release packages that have no new
          commits (e.g. after a release-pipeline bug fix). Empty (the
          default) => normal change-detected release.
        type: string
        default: ''
    secrets:
      # Optional fallback for accounts where Trusted Publishing isn't
      # available, or for the very first publish of a brand-new crate
      # (Trusted Publishing on crates.io binds to an already-published
      # crate, so first-publish has no OIDC path). When set, the OIDC
      # exchange via `rust-lang/crates-io-auth-action` is skipped and
      # this token is exported to $GITHUB_ENV as CARGO_REGISTRY_TOKEN
      # for the engine's crates handler.
      CARGO_REGISTRY_TOKEN:
        required: false
      # Optional fallback for the very first publish of a brand-new npm
      # package (Trusted Publishing on npm binds to an already-published
      # package, so first-publish has no OIDC path). When set AND the
      # planned matrix contains an npm row, this token is exported to
      # $GITHUB_ENV as NODE_AUTH_TOKEN; the npm CLI then prefers the
      # long-lived token over the OIDC path. For bundled-cli / napi
      # families the same secret authenticates publishes of all per-
      # platform sub-packages on first publish; once those exist, each
      # one needs its own TP registration. Drop the secret once Trusted
      # Publishing is registered. See #302.
      NPM_TOKEN:
        required: false
    outputs:
      has_pypi:
        description: >-
          `'true'` when the planned matrix contains any pypi rows. Consumers
          gate their caller-side `pypi-publish` job on this so npm/crates-only
          repos don't need the extra job. PyPI uploads run in the caller's
          workflow context (not this reusable workflow) — see
          README → "Publishing to PyPI". Always a string ("true"/"false")
          per `workflow_call` output rules.
        value: ${{ jobs.build.outputs.has_pypi }}
      released:
        description: >-
          `'true'` when this run newly published ≥ 1 package, else
          `'false'`. Unlike `has_pypi` (plan-time: "we intend to build"),
          this is publish-time: idempotent re-runs whose versions are
          already live report `'false'`. Gate a caller-side post-release
          job on it (`if: needs.release.outputs.released == 'true'`) — see
          README → "Post-release bookkeeping" (#461). Empty string when
          the publish job is skipped (empty plan); Always a string per
          `workflow_call` output rules.
        value: ${{ jobs.publish.outputs.released }}
      released_packages:
        description: >-
          JSON array of what newly shipped this run —
          `[{"name","version","tag"}, …]`, in publish (dependency) order.
          Empty array `[]` when nothing newly published. A post-release
          job reads it for a changelog section title, a docs version
          stamp, or an announcement, instead of reverse-engineering the
          set from pushed tags. See README → "Post-release bookkeeping"
          (#461). Empty string when the publish job is skipped.
        value: ${{ jobs.publish.outputs.released_packages }}

concurrency:
  group: putitoutthere-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    uses: thekevinscott/putitoutthere/.github/workflows/_matrix.yml@v0
    with:
      node_version: ${{ inputs.node_version }}
      python_version: ${{ inputs.python_version }}
      release_packages: ${{ inputs.release_packages }}

  publish:
    needs: build
    if: fromJSON(needs.build.outputs.matrix || '[]')[0] != null
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
      id-token: write
    outputs:
      # #461: propagate the publish step's release facts up to the
      # reusable workflow's outputs. Same two-hop wiring `has_pypi`
      # uses (engine step → job → workflow_call.outputs). The engine
      # writes these to $GITHUB_OUTPUT only when a package newly ships.
      released: ${{ steps.publish.outputs.released }}
      released_packages: ${{ steps.publish.outputs.released_packages }}
    env:
      # Promote the optional caller-provided crates.io token to a job-
      # level env var so step `if:` conditions can gate on it. The
      # `secrets` context isn't available in step-level `if:` (only
      # `env`, `inputs`, `needs`, etc), so the OIDC vs caller-token
      # branching has to read through this var. Empty string when the
      # caller didn't wire the secret; non-empty when they did.
      CALLER_CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      # Same shape as CALLER_CARGO_REGISTRY_TOKEN, for npm. See #302.
      CALLER_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://registry.npmjs.org'

      # PyPI: the upload step is owned by the caller's `pypi-publish`
      # job (see README → "Publishing to PyPI"). The engine's role
      # here is plan + build artifact discovery + version-rewrite +
      # tag creation; no twine, no setup-python.

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Configure git identity for tagging
        # Annotated tags require committer identity; hosted runners have
        # none by default.
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # crates.io OIDC trusted publisher exchange: ID-token -> short-
      # lived CARGO_REGISTRY_TOKEN. Only fires when the plan contains a
      # crates row AND the caller did not supply CARGO_REGISTRY_TOKEN
      # via `secrets:` (issue #283). Pure JS/Python repos skip the
      # action entirely so they don't need a configured trusted
      # publisher on crates.io; callers passing a long-lived token
      # also skip it so the OIDC-minted token doesn't clobber theirs.
      - name: Authenticate with crates.io (OIDC)
        if: contains(needs.build.outputs.matrix, '"kind":"crates"') && env.CALLER_CARGO_REGISTRY_TOKEN == ''
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1.0.5

      - name: Export CARGO_REGISTRY_TOKEN (OIDC)
        if: steps.crates-auth.outcome == 'success'
        env:
          CRATES_IO_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: echo "CARGO_REGISTRY_TOKEN=$CRATES_IO_TOKEN" >> "$GITHUB_ENV"

      # Caller-provided token path (issue #283). Trusted Publishing on
      # crates.io binds to an already-published crate, so the first
      # publish of a brand-new crate has no OIDC path; this step lets
      # the caller supply a long-lived token via `secrets:` and have
      # the engine's crates handler pick it up through $GITHUB_ENV
      # exactly as it would the OIDC-minted one. The secret is read
      # through the job-level `CALLER_CARGO_REGISTRY_TOKEN` env var
      # because step-level `if:` cannot reference the `secrets` context.
      - name: Export CARGO_REGISTRY_TOKEN (caller-provided)
        if: contains(needs.build.outputs.matrix, '"kind":"crates"') && env.CALLER_CARGO_REGISTRY_TOKEN != ''
        run: echo "CARGO_REGISTRY_TOKEN=$CALLER_CARGO_REGISTRY_TOKEN" >> "$GITHUB_ENV"

      # Caller-provided npm token path (issue #302). Mirror of the
      # CARGO_REGISTRY_TOKEN fallback above. Trusted Publishing on npm
      # binds to an already-published package, so the first publish of
      # a brand-new package has no OIDC path; this step lets the caller
      # supply a long-lived token via `secrets:` and have the npm CLI
      # pick it up through $GITHUB_ENV (setup-node@v6 already wires
      # NODE_AUTH_TOKEN into the .npmrc auth template). The secret is
      # read through the job-level `CALLER_NPM_TOKEN` env var because
      # step-level `if:` cannot reference the `secrets` context. When
      # NODE_AUTH_TOKEN is set, the npm CLI prefers it over the OIDC
      # path — there's no separate OIDC step to skip, just the env-var
      # presence that switches the CLI's auth mode. Drop the secret
      # once Trusted Publishing is registered against the (now-existing)
      # package; for bundled-cli / napi families each per-platform sub-
      # package needs its own TP registration.
      - name: Export NODE_AUTH_TOKEN (caller-provided)
        if: contains(needs.build.outputs.matrix, '"kind":"npm"') && env.CALLER_NPM_TOKEN != ''
        run: echo "NODE_AUTH_TOKEN=$CALLER_NPM_TOKEN" >> "$GITHUB_ENV"

      # Build npm packages from source before `npm publish` runs.
      # The build job's `dist/` is not carried through as an artifact
      # for vanilla npm rows (artifact_path is `package.json`); the
      # publish job is a fresh checkout, so any package whose
      # package.json declares `"files": ["dist", ...]` would ship a
      # tarball missing the compiled output. Rebuild here to mirror
      # what a developer running `npm publish` locally would do.
      # napi / bundled-cli platform packages stage from artifacts/
      # via the engine's npm-platform handler and are unaffected.
      - name: Build npm packages
        if: contains(needs.build.outputs.matrix, '"kind":"npm"')
        shell: bash
        env:
          MATRIX: ${{ needs.build.outputs.matrix }}
        run: |
          set -euo pipefail
          paths=$(printf '%s' "$MATRIX" | jq -r '.[] | select(.kind == "npm") | .path' | sort -u)
          # Strict installs (`npm ci`, `pnpm install --frozen-lockfile`) self-
          # heal to their non-strict form on failure. Why: bundled-cli / napi
          # consumers declare `optionalDependencies` for `<name>-<triple>@<version>`
          # platform packages that this pipeline produces. On the first publish,
          # those entries 404 on the registry; pnpm 10 silently drops 404'd
          # optionals from the lockfile when it is regenerated locally, then
          # `--frozen-lockfile` refuses on the next CI run because the lockfile
          # and package.json disagree. The `::warning::` makes the fallback
          # visible in the run log. Same shape used by `_matrix.yml`'s build
          # step. See README → Recipes → Bundled-CLI npm family.
          for path in $paths; do
            echo "::group::npm install + build at ${path}"
            pushd "${path}" > /dev/null
            if [ -f package-lock.json ]; then
              npm ci || {
                echo "::warning::package-lock.json drift (likely 404 on platform-package optionalDependencies for a brand-new bundled-cli/napi family); falling back to npm install"
                npm install
              }
            elif [ -f pnpm-lock.yaml ]; then
              # pnpm for the *consumer's* checkout, not ours. Deliberately a
              # literal and not ./.github/actions/setup-pnpm: that action installs
              # our build toolchain, this installs theirs, and a `uses:` step
              # cannot appear inside a run: script anyway.
              npm install -g pnpm@11
              pnpm install --frozen-lockfile || {
                echo "::warning::pnpm-lock.yaml drift (likely 404 on platform-package optionalDependencies for a brand-new bundled-cli/napi family); falling back to pnpm install --no-frozen-lockfile"
                pnpm install --no-frozen-lockfile
              }
            else
              npm install
            fi
            # #287: export TARGET / BUILD so consumer build scripts that
            # dispatch on them (bundled-cli / napi) see a defined value
            # rather than `undefined`. The publish-time rebuild only runs
            # for the *main* package row (per-platform sub-packages stage
            # from artifacts/ via the engine's npm-platform handler and
            # are unaffected here), so TARGET is fixed at "main" — build
            # scripts written against the documented contract no-op on
            # TARGET=main and run vanilla TS/JS compilation otherwise.
            # BUILD is left empty because there is no single matrix-row
            # `build` mode at this point: a multi-mode package is both
            # napi and bundled-cli; the rebuild is the union view.
            TARGET=main BUILD='' npm run build --if-present
            popd > /dev/null
            echo "::endgroup::"
          done

      - id: publish
        uses: thekevinscott/putitoutthere@v0
        env:
          # The repository-visibility preflight check calls the GitHub
          # API; an authenticated call gets 5000 req/hr instead of the
          # unauthenticated 60, so a busy runner never rate-limits.
          GITHUB_TOKEN: ${{ github.token }}
        with:
          command: publish
          # publish re-runs plan internally; it must see the same
          # manual-release spec the plan job did or the two phases
          # disagree on the matrix.
          release_packages: ${{ inputs.release_packages }}

      # The engine creates annotated git tags + pushes to PyPI / npm /
      # crates.io but does NOT cut GitHub Releases. Backfill that here so
      # the project's /releases page tracks the tag history.
      #
      # The no-fetch / ref-scoped-push / idempotent-create contract (#436,
      # #437) now lives in the `release-github` engine command as tested
      # code (`src/release-github/`), not inline bash — this step is pure
      # wiring. `GH_TOKEN` authenticates `gh`; the checkout's persisted
      # credentials authenticate the ref-scoped `git push`.
      - name: Create GitHub Release(s) for new tag(s)
        uses: thekevinscott/putitoutthere@v0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          command: release-github
