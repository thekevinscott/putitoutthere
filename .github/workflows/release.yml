name: putitoutthere release

# Reusable workflow for publishing to crates.io, PyPI, and npm.
#
# Consumer integration (their own .github/workflows/release.yml):
#
#   on:
#     push: { branches: [main] }
#
#   jobs:
#     release:
#       uses: thekevinscott/putitoutthere/.github/workflows/release.yml@v0
#       permissions:
#         contents: write
#         id-token: write
#
# That is the entire surface a consumer touches. `putitoutthere.toml`
# at the repo root is the config; nothing about that is configurable.
#
# Auth: OIDC trusted publishers on all three registries (crates.io,
# PyPI, npm). Long-lived registry tokens are explicitly NOT supported
# via this workflow — register a trusted publisher per registry once,
# then publishes are zero-secret. See docs/guide/auth.md.
#
# This file delegates the plan + build matrix to `_matrix.yml`
# (`uses: thekevinscott/putitoutthere/.github/workflows/_matrix.yml@v0`)
# so the same matrix runs on PR-time `build.yml` invocations and at
# release time. The `publish` job below is the only piece that lives
# in this file — keeping it isolated to the release path is what makes
# `build.yml` a structural-not-runtime guarantee against accidental
# publishes (publish-capable bytes simply do not exist there).
#
# The `uses: thekevinscott/putitoutthere@v0` calls inside this file
# (and inside `_matrix.yml`) resolve to the same git ref the workflow
# itself was loaded from, so the workflow + engine always agree on a
# single version.

on:
  workflow_call:
    inputs:
      environment:
        description: >-
          GitHub deployment environment to gate the publish job. Required-
          reviewers + secret scoping are configured per-environment in the
          consumer's repo settings. Default `release`.
        type: string
        default: 'release'
      node_version:
        description: >-
          Node version for plan / publish runners and for kind = "npm"
          build steps. Default `24`.
        type: string
        default: '24'
      python_version:
        description: >-
          Python version for kind = "pypi" build steps. Default `3.12`.
        type: string
        default: '3.12'
    outputs:
      has_pypi:
        description: >-
          `'true'` when the planned matrix contains any pypi rows. Consumers
          gate their caller-side `pypi-publish` job on this so npm/crates-only
          repos don't need the extra job. PyPI uploads run in the caller's
          workflow context (not this reusable workflow) — see
          README → "Publishing to PyPI". Always a string ("true"/"false")
          per `workflow_call` output rules.
        value: ${{ jobs.build.outputs.has_pypi }}

concurrency:
  group: putitoutthere-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    uses: thekevinscott/putitoutthere/.github/workflows/_matrix.yml@v0
    with:
      node_version: ${{ inputs.node_version }}
      python_version: ${{ inputs.python_version }}

  publish:
    needs: build
    if: fromJSON(needs.build.outputs.matrix || '[]')[0] != null
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://registry.npmjs.org'

      # PyPI: the upload step is owned by the caller's `pypi-publish`
      # job (see README → "Publishing to PyPI"). The engine's role
      # here is plan + build artifact discovery + version-rewrite +
      # tag creation; no twine, no setup-python.

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Configure git identity for tagging
        # Annotated tags require committer identity; hosted runners have
        # none by default.
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # crates.io OIDC trusted publisher exchange: ID-token -> short-
      # lived CARGO_REGISTRY_TOKEN. Only fires when the plan contains a
      # crates row; pure JS/Python repos skip the action entirely so
      # they don't need a configured trusted publisher on crates.io.
      - name: Authenticate with crates.io (OIDC)
        if: contains(needs.build.outputs.matrix, '"kind":"crates"')
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1.0.4

      - name: Export CARGO_REGISTRY_TOKEN
        if: steps.crates-auth.outcome == 'success'
        env:
          CRATES_IO_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: echo "CARGO_REGISTRY_TOKEN=$CRATES_IO_TOKEN" >> "$GITHUB_ENV"

      # Build npm packages from source before `npm publish` runs.
      # The build job's `dist/` is not carried through as an artifact
      # for vanilla npm rows (artifact_path is `package.json`); the
      # publish job is a fresh checkout, so any package whose
      # package.json declares `"files": ["dist", ...]` would ship a
      # tarball missing the compiled output. Rebuild here to mirror
      # what a developer running `npm publish` locally would do.
      # napi / bundled-cli platform packages stage from artifacts/
      # via the engine's npm-platform handler and are unaffected.
      - name: Build npm packages
        if: contains(needs.build.outputs.matrix, '"kind":"npm"')
        shell: bash
        env:
          MATRIX: ${{ needs.build.outputs.matrix }}
        run: |
          set -euo pipefail
          paths=$(printf '%s' "$MATRIX" | jq -r '.[] | select(.kind == "npm") | .path' | sort -u)
          for path in $paths; do
            echo "::group::npm install + build at ${path}"
            pushd "${path}" > /dev/null
            if [ -f package-lock.json ]; then
              npm ci
            elif [ -f pnpm-lock.yaml ]; then
              npm install -g pnpm@9
              pnpm install --frozen-lockfile
            else
              npm install
            fi
            npm run build --if-present
            popd > /dev/null
            echo "::endgroup::"
          done

      - uses: thekevinscott/putitoutthere@v0
        with:
          command: publish

      # The engine creates annotated git tags + pushes to PyPI / npm /
      # crates.io but does NOT cut GitHub Releases. Backfill that here so
      # the project's /releases page tracks the tag history. Auto-generated
      # notes pull PR titles between this tag and the previous one.
      - name: Create GitHub Release(s) for new tag(s)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          new_tags=$(git tag --points-at HEAD)
          if [ -z "$new_tags" ]; then
            echo "No tags on HEAD; nothing to release on GitHub."
            exit 0
          fi
          for tag in $new_tags; do
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "GitHub Release $tag already exists; skipping."
              continue
            fi
            gh release create "$tag" --title "$tag" --generate-notes
            echo "Created GitHub Release for $tag"
          done
