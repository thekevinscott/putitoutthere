name: Secret scan

# Scans the full working tree and git history for accidentally-
# committed secrets. putitoutthere handles registry tokens, so leaks
# from an npm token test fixture into a PR would be catastrophic --
# this check blocks merge.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
