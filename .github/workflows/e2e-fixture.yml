name: E2E

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    name: e2e (${{ matrix.fixture }})
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - js-vanilla
          - js-napi
          - js-bundled-cli
          - js-python-no-rust
          - python-pure-hatch
          - python-pure-sdist-only
          - python-rust-maturin
          - polyglot-everything
    uses: ./.github/workflows/e2e-fixture-job.yml
    secrets: inherit
    with:
      fixture: ${{ matrix.fixture }}

  # pypa/gh-action-pypi-publish aborts inside reusable workflows
  # (warehouse#11096), so PyPI upload has to live at the caller level.
  # See notes/audits/2026-04-28-pypi-tp-reusable-workflow-constraint.md.
  pypi-publish:
    needs: e2e
    runs-on: ubuntu-latest
    environment: e2e
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: '*-sdist'
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: '*-wheel-*'
          path: dist/
          merge-multiple: true
      - id: have-pypi
        run: |
          if [ -n "$(ls -A dist/ 2>/dev/null)" ]; then
            echo "have_pypi=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_pypi=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.have-pypi.outputs.have_pypi == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
