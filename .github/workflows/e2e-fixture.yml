name: E2E

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      simulate_no_dist:
        description: >-
          #304 / #256 repro toggle. When true, first-publish fixtures clobber
          their `dist/` directory after build but before publish, so the
          post-publish tarball-verify step fails. Use to demonstrate that
          the verify step actually catches missing build output against
          the empty Verdaccio. Off by default.
        type: boolean
        required: false
        default: false

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    name: e2e (${{ matrix.fixture }})
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - js-vanilla
          - js-vanilla-first-publish
          - js-napi
          - js-napi-first-publish
          - js-bundled-cli
          - js-bundled-cli-first-publish
          - js-python-no-rust
          - js-python-no-rust-first-publish
          - python-pure-hatch
          - python-pure-sdist-only
          - python-rust-maturin
          - polyglot-everything
          - polyglot-everything-first-publish
          - rust-vanilla-first-publish
    uses: ./.github/workflows/e2e-fixture-job.yml
    secrets: inherit
    with:
      fixture: ${{ matrix.fixture }}
      simulate_no_dist: ${{ inputs.simulate_no_dist || false }}

  # pypa/gh-action-pypi-publish aborts inside reusable workflows
  # (warehouse#11096), so PyPI upload has to live at the caller level.
  # See notes/audits/2026-04-28-pypi-tp-reusable-workflow-constraint.md.
  pypi-publish:
    needs: e2e
    runs-on: ubuntu-latest
    environment: e2e
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: '*-sdist'
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: '*-wheel-*'
          path: dist/
          merge-multiple: true
      # #294: discard first-publish wheels/sdists. They carry a literal
      # `_placeholder` token in the project-name half of the filename
      # (maturin normalizes the fixture's `-placeholder` suffix to
      # `_placeholder` in wheel/sdist filenames; the build job's
      # materialize step does NOT apply the `-placeholder` rewrite, by
      # design — see e2e-fixture-job.yml's plan/publish materialize
      # comments). Real PyPI has no Trusted Publisher record for these
      # uniquified names, so the pypa-publish PUT would 4xx. The
      # diagnostic surface that the maturin path provides on a
      # first-publish fixture is the in-job wheel-content guard
      # (e2e-fixture-job.yml lines ~233-274), not the upload to a
      # real registry — TP-shaped failure modes are explicitly out of
      # scope per issue 294.
      - name: Discard first-publish wheels (no TP record on real PyPI)
        run: |
          set -euo pipefail
          dropped=0
          while IFS= read -r -d '' f; do
            rm -f "$f"
            dropped=$((dropped + 1))
            echo "  dropped: $(basename "$f")"
          done < <(find dist/ -maxdepth 1 -type f \
            \( -name '*_placeholder*' -o -name '*-placeholder*' \) -print0 2>/dev/null)
          if [ "$dropped" -gt 0 ]; then
            echo "::warning::Dropped ${dropped} first-publish artifact(s) from dist/ — Trusted Publisher records are not provisioned for uniquified package names. The maturin build path on a first-publish fixture is guarded by the in-job wheel-content guard, not by the real-PyPI upload."
          fi
      - id: have-pypi
        run: |
          if [ -n "$(ls -A dist/ 2>/dev/null)" ]; then
            echo "have_pypi=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_pypi=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.have-pypi.outputs.have_pypi == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # #295: PyPI is the only registry with a public test instance whose
  # upload semantics match production closely enough to catch warehouse-
  # shaped failures before consumers hit them. Keep this as a separate
  # caller-side publish job for the same reason as `pypi-publish` above:
  # pypa/gh-action-pypi-publish aborts inside nested reusable workflows.
  testpypi-publish:
    name: TestPyPI publish + verify
    needs: e2e
    runs-on: ubuntu-latest
    environment: e2e
    permissions:
      id-token: write
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/download-artifact@v8
        with:
          pattern: 'piot-fixture-zzz-python-maturin-sdist'
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: 'piot-fixture-zzz-python-maturin-wheel-*'
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: 'piot-fixture-zzz-python-hatch-sdist'
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: 'piot-fixture-zzz-python-hatch-wheel-any'
          path: dist/
          merge-multiple: true

      - name: Assert TestPyPI fixture artifacts exist
        run: |
          set -euo pipefail
          find dist -maxdepth 1 -type f -print | sort
          for prefix in \
            piot_fixture_zzz_python_maturin \
            piot_fixture_zzz_python_hatch
          do
            sdist=$(find dist -maxdepth 1 -type f -name "${prefix}-*.tar.gz" -print -quit)
            if [ -z "$sdist" ]; then
              echo "::error::missing ${prefix} sdist artifact for TestPyPI"
              exit 1
            fi
            wheel=$(find dist -maxdepth 1 -type f -name "${prefix}-*.whl" -print -quit)
            if [ -z "$wheel" ]; then
              echo "::error::missing ${prefix} wheel artifact for TestPyPI"
              exit 1
            fi
          done

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

      - name: Verify TestPyPI artifact metadata
        env:
          TESTPYPI_INDEX_URL: https://test.pypi.org/simple/
        run: |
          set -euo pipefail
          python - <<'PY' > testpypi-requirements.txt
          from pathlib import Path
          import sys

          dist = Path("dist")
          packages = {
              "piot-fixture-zzz-python-maturin": "piot_fixture_zzz_python_maturin",
              "piot-fixture-zzz-python-hatch": "piot_fixture_zzz_python_hatch",
          }
          for package, stem in packages.items():
              versions = set()
              for artifact in dist.glob(f"{stem}-*"):
                  name = artifact.name
                  if name.endswith(".tar.gz"):
                      versions.add(name.removeprefix(f"{stem}-").removesuffix(".tar.gz"))
                  elif name.endswith(".whl"):
                      parts = name.split("-")
                      if len(parts) >= 2:
                          versions.add(parts[1])
              if len(versions) != 1:
                  print(
                      f"expected exactly one version for {package}, found {sorted(versions)}",
                      file=sys.stderr,
                  )
                  sys.exit(1)
              version = versions.pop()
              print(f"{package}=={version}")
          PY

          rm -rf downloaded-wheels downloaded-sdists
          mkdir -p downloaded-wheels downloaded-sdists
          while IFS= read -r req; do
            echo "Downloading wheel for ${req} from TestPyPI"
            wheel_downloaded=0
            for attempt in 1 2 3 4 5 6; do
              if python -m pip download \
                --index-url "${TESTPYPI_INDEX_URL}" \
                --no-deps \
                --only-binary=:all: \
                --dest downloaded-wheels \
                "${req}"; then
                wheel_downloaded=1
                break
              fi
              if [ "$attempt" -lt 6 ]; then
                sleep_for=$((attempt * 10))
                echo "TestPyPI wheel index lag for ${req}; retrying in ${sleep_for}s"
                sleep "$sleep_for"
              fi
            done
            if [ "$wheel_downloaded" -ne 1 ]; then
              echo "::error::failed to download wheel for ${req} from TestPyPI"
              exit 1
            fi
          done < testpypi-requirements.txt

          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import unquote, urljoin, urlparse
          from urllib.request import urlopen
          import os
          import sys
          import time

          class SimpleLinks(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.hrefs = []

              def handle_starttag(self, tag, attrs):
                  if tag != "a":
                      return
                  attrs_dict = dict(attrs)
                  href = attrs_dict.get("href")
                  if href:
                      self.hrefs.append(href)

          index_url = os.environ["TESTPYPI_INDEX_URL"].rstrip("/") + "/"
          out_dir = Path("downloaded-sdists")
          out_dir.mkdir(exist_ok=True)
          for req in Path("testpypi-requirements.txt").read_text().splitlines():
              package, version = req.split("==", 1)
              project_url = urljoin(index_url, f"{package}/")
              expected_suffix = f"-{version}.tar.gz"
              for attempt in range(1, 7):
                  try:
                      with urlopen(project_url, timeout=30) as response:
                          html = response.read().decode()
                      parser = SimpleLinks()
                      parser.feed(html)
                      for href in parser.hrefs:
                          filename = unquote(urlparse(href).path.rsplit("/", 1)[-1])
                          if filename.endswith(expected_suffix):
                              artifact_url = urljoin(project_url, href)
                              print(f"Downloading sdist for {req} from {artifact_url}")
                              with urlopen(artifact_url, timeout=60) as response:
                                  (out_dir / filename).write_bytes(response.read())
                              break
                      else:
                          raise RuntimeError(f"no sdist ending {expected_suffix} on {project_url}")
                      break
                  except Exception as exc:
                      if attempt == 6:
                          print(f"failed to download sdist for {req}: {exc}", file=sys.stderr)
                          sys.exit(1)
                      sleep_for = attempt * 10
                      print(f"TestPyPI sdist index lag for {req}; retrying in {sleep_for}s")
                      time.sleep(sleep_for)
          PY

          python - <<'PY'
          from pathlib import Path
          import sys
          import tarfile
          import zipfile

          wheels_dir = Path("downloaded-wheels")
          sdists_dir = Path("downloaded-sdists")
          for req in Path("testpypi-requirements.txt").read_text().splitlines():
              package, version = req.split("==", 1)
              stem = package.replace("-", "_")
              wheels = sorted(wheels_dir.glob(f"{stem}-{version}-*.whl"))
              if not wheels:
                  print(f"no downloaded wheel for {req}", file=sys.stderr)
                  sys.exit(1)
              with zipfile.ZipFile(wheels[0]) as wheel:
                  metadata_paths = [
                      name for name in wheel.namelist()
                      if name.endswith(".dist-info/METADATA")
                  ]
                  if len(metadata_paths) != 1:
                      print(
                          f"expected one METADATA file in {wheels[0].name}, found {metadata_paths}",
                          file=sys.stderr,
                      )
                      sys.exit(1)
                  metadata = wheel.read(metadata_paths[0]).decode()
              actual = None
              for line in metadata.splitlines():
                  if line.startswith("Version: "):
                      actual = line.removeprefix("Version: ").strip()
                      break
              if actual != version:
                  print(
                      f"{wheels[0].name} METADATA Version={actual!r}, expected {version!r}",
                      file=sys.stderr,
                  )
                  sys.exit(1)
              print(f"ok: {wheels[0].name} METADATA Version={actual}")

              sdists = sorted(sdists_dir.glob(f"{stem}-{version}.tar.gz"))
              if not sdists:
                  print(f"no downloaded sdist for {req}", file=sys.stderr)
                  sys.exit(1)
              with tarfile.open(sdists[0]) as sdist:
                  pkg_info_paths = [
                      member for member in sdist.getmembers()
                      if member.name.endswith("/PKG-INFO")
                  ]
                  if not pkg_info_paths:
                      print(f"no PKG-INFO file in {sdists[0].name}", file=sys.stderr)
                      sys.exit(1)
                  pkg_info = sdist.extractfile(pkg_info_paths[0])
                  if pkg_info is None:
                      print(f"could not read PKG-INFO in {sdists[0].name}", file=sys.stderr)
                      sys.exit(1)
                  metadata = pkg_info.read().decode()
              actual = None
              for line in metadata.splitlines():
                  if line.startswith("Version: "):
                      actual = line.removeprefix("Version: ").strip()
                      break
              if actual != version:
                  print(
                      f"{sdists[0].name} PKG-INFO Version={actual!r}, expected {version!r}",
                      file=sys.stderr,
                  )
                  sys.exit(1)
              print(f"ok: {sdists[0].name} PKG-INFO Version={actual}")
          PY
