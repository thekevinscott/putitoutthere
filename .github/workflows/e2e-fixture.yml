name: E2E

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      simulate_no_dist:
        description: >-
          #304 / #256 repro toggle. When true, first-publish fixtures clobber
          their `dist/` directory after build but before publish, so the
          post-publish tarball-verify step fails. Use to demonstrate that
          the verify step actually catches missing build output against
          the empty Verdaccio. Off by default.
        type: boolean
        required: false
        default: false

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    name: e2e (${{ matrix.fixture }})
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - js-vanilla
          - js-vanilla-first-publish
          - js-napi
          - js-napi-first-publish
          - js-bundled-cli
          - js-bundled-cli-first-publish
          - js-python-no-rust
          - js-python-no-rust-first-publish
          - python-pure-hatch
          - python-pure-sdist-only
          - python-rust-maturin
          - python-rust-maturin-workspace-first-publish
          - polyglot-everything
          - polyglot-everything-first-publish
          - rust-vanilla-first-publish
    uses: ./.github/workflows/e2e-fixture-job.yml
    secrets: inherit
    with:
      fixture: ${{ matrix.fixture }}
      simulate_no_dist: ${{ inputs.simulate_no_dist || false }}

  # pypa/gh-action-pypi-publish aborts inside reusable workflows
  # (warehouse#11096), so PyPI upload has to live at the caller level.
  # See notes/audits/2026-04-28-pypi-tp-reusable-workflow-constraint.md.
  pypi-publish:
    needs: e2e
    runs-on: ubuntu-latest
    environment: e2e
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: '*-sdist'
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: '*-wheel-*'
          path: dist/
          merge-multiple: true
      # #294: discard first-publish wheels/sdists. They carry a literal
      # `_placeholder` token in the project-name half of the filename
      # (maturin normalizes the fixture's `-placeholder` suffix to
      # `_placeholder` in wheel/sdist filenames; the build job's
      # materialize step does NOT apply the `-placeholder` rewrite, by
      # design — see e2e-fixture-job.yml's plan/publish materialize
      # comments). Real PyPI has no Trusted Publisher record for these
      # uniquified names, so the pypa-publish PUT would 4xx. The
      # diagnostic surface that the maturin path provides on a
      # first-publish fixture is the in-job wheel-content guard
      # (e2e-fixture-job.yml lines ~233-274), not the upload to a
      # real registry — TP-shaped failure modes are explicitly out of
      # scope per issue 294.
      - name: Discard first-publish wheels (no TP record on real PyPI)
        run: |
          set -euo pipefail
          dropped=0
          while IFS= read -r -d '' f; do
            rm -f "$f"
            dropped=$((dropped + 1))
            echo "  dropped: $(basename "$f")"
          done < <(find dist/ -maxdepth 1 -type f \
            \( -name '*_placeholder*' -o -name '*-placeholder*' \) -print0 2>/dev/null)
          if [ "$dropped" -gt 0 ]; then
            echo "::warning::Dropped ${dropped} first-publish artifact(s) from dist/ — Trusted Publisher records are not provisioned for uniquified package names. The maturin build path on a first-publish fixture is guarded by the in-job wheel-content guard, not by the real-PyPI upload."
          fi
      - id: have-pypi
        run: |
          if [ -n "$(ls -A dist/ 2>/dev/null)" ]; then
            echo "have_pypi=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_pypi=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.have-pypi.outputs.have_pypi == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # #295: PyPI is the only registry with a public test instance whose
  # upload semantics match production closely enough to catch warehouse-
  # shaped failures before consumers hit them. Keep this as a separate
  # caller-side publish job for the same reason as `pypi-publish` above:
  # pypa/gh-action-pypi-publish aborts inside nested reusable workflows.
  testpypi-publish:
    name: TestPyPI publish + verify
    needs: e2e
    runs-on: ubuntu-latest
    environment: e2e
    permissions:
      id-token: write
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Toolchain for `pnpm exec piot-ci`. Checkout runs before the
      # artifact downloads so its workspace clean does not wipe dist/.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-node

      - uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v8
        with:
          pattern: 'piot-fixture-zzz-python-maturin-sdist'
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: 'piot-fixture-zzz-python-maturin-wheel-*'
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: 'piot-fixture-zzz-python-hatch-sdist'
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: 'piot-fixture-zzz-python-hatch-wheel-any'
          path: dist/
          merge-multiple: true

      - name: Assert TestPyPI fixture artifacts exist
        run: pnpm exec piot-ci testpypi-verify assert

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

      - name: Verify TestPyPI artifact metadata
        env:
          TESTPYPI_INDEX_URL: https://test.pypi.org/simple/
        run: pnpm exec piot-ci testpypi-verify metadata
