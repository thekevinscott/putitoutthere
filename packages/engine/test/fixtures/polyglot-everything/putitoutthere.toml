[putitoutthere]
version = 1

# Reference polyglot fixture mirroring the dirsql shape:
#   rust crate → python wheels (maturin) + multi-mode npm
#   (bundled-cli binary AND napi-rs `.node` addon, both selected
#   via the main package's optionalDependencies at install time).
# The v0 success criterion (plan.md §25.3 #2).

[[package]]
name = "piot-fixture-zzz-poly-rust"
kind = "crates"
path = "packages/rust"
globs = ["packages/rust/**"]
first_version = "__VERSION__"

[[package]]
name = "piot-fixture-zzz-python"
kind = "pypi"
path = "packages/python"
globs = ["packages/python/**"]
build = "maturin"
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
depends_on = ["piot-fixture-zzz-poly-rust"]
first_version = "__VERSION__"

[[package]]
name = "@putitoutthere/piot-fixture-zzz-cli"
kind = "npm"
path = "packages/ts"
globs = ["packages/ts/**"]
# #dirsql: dual-mode npm. Bundled-cli keeps the historical
# `<name>-<triple>` platform-package names (no infix) so the existing
# trusted-publisher registrations still cover it; the napi family uses
# a `-napi-` infix and needs new TP registrations
# (`@putitoutthere/piot-fixture-zzz-cli-napi-<triple>`).
build = [
  "bundled-cli",
  { mode = "napi", name = "{name}-napi-{triple}" },
]
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
depends_on = ["piot-fixture-zzz-poly-rust"]
first_version = "__VERSION__"
# See test/fixtures/js-vanilla/putitoutthere.toml for why e2e
# fixtures publish to a dedicated dist-tag instead of `latest`.
tag = "e2e"
