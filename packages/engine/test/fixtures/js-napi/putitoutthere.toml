[putitoutthere]
version = 1

[[package]]
name = "@putitoutthere/piot-fixture-zzz-js-napi"
kind = "npm"
path = "."
globs = ["src/**", "index.ts", "tsconfig.json", "Cargo.toml", "package.json"]
build = "napi"
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
first_version = "__VERSION__"
# See test/fixtures/js-vanilla/putitoutthere.toml for why e2e
# fixtures publish to a dedicated dist-tag instead of `latest`.
tag = "e2e"
