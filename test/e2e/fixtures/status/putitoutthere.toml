# Live, piot-owned fixture packages published to the real registries by
# the CI e2e suite (inventory in test/fixtures/README.md). Their versions
# follow the suite's `0.0.{unix_seconds}` scheme. `status` reads each
# one's real latest version; with no local tag, each is
# published-but-untagged.
[putitoutthere]
version = 1

[[package]]
name  = "fixture-rust"
kind  = "crates"
crate = "piot-fixture-zzz-poly-rust"
path  = "packages/rust"
globs = ["packages/rust/**"]

[[package]]
name  = "fixture-npm"
kind  = "npm"
npm   = "@putitoutthere/piot-fixture-zzz-js-vanilla"
path  = "packages/npm"
globs = ["packages/npm/**"]

[[package]]
name  = "fixture-py"
kind  = "pypi"
pypi  = "piot-fixture-zzz-python-hatch"
build = "hatch"
path  = "packages/py"
globs = ["packages/py/**"]
