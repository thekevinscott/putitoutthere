[putitoutthere]
version = 1

[[package]]
name = "piot-fixture-zzz-python-maturin"
kind = "pypi"
path = "."
globs = ["src/**", "Cargo.toml", "pyproject.toml"]
build = "maturin"
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
first_version = "__VERSION__"
