[putitoutthere]
version = 1

# Reference polyglot fixture mirroring the dirsql shape:
#   rust crate → python wheels (maturin) + npm bundled-cli (rust binary).
# The v0 success criterion (plan.md §25.3 #2).

[[package]]
name = "piot-fixture-zzz-rust"
kind = "crates"
path = "packages/rust"
paths = ["packages/rust/**"]
first_version = "__VERSION__"

[[package]]
name = "piot-fixture-zzz-python"
kind = "pypi"
path = "packages/python"
paths = ["packages/python/**"]
build = "maturin"
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
depends_on = ["piot-fixture-zzz-rust"]
first_version = "__VERSION__"

[[package]]
name = "piot-fixture-zzz-cli"
kind = "npm"
path = "packages/ts"
paths = ["packages/ts/**"]
build = "bundled-cli"
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
depends_on = ["piot-fixture-zzz-rust"]
first_version = "__VERSION__"
