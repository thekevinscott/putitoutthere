[putitoutthere]
version = 1

[[package]]
name = "piot-fixture-zzz-rust-cli"
kind = "crates"
path = "packages/rust"
paths = ["packages/rust/**"]
first_version = "__VERSION__"

[[package]]
name = "piot-fixture-zzz-cli"
kind = "npm"
path = "packages/js"
paths = ["packages/js/**"]
build = "bundled-cli"
targets = ["x86_64-unknown-linux-gnu", "aarch64-apple-darwin"]
depends_on = ["piot-fixture-zzz-rust-cli"]
first_version = "__VERSION__"
