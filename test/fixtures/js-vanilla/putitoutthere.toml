[putitoutthere]
version = 1

# Live canary. Publishes the `piot-fixture-zzz-cli` family on every PR
# and push to main via OIDC trusted publishing — see test/e2e/README.md.
# Single npm vanilla shape; covers the npm OIDC + plain `npm publish`
# manifestation in the e2e matrix.

[[package]]
name = "piot-fixture-zzz-cli"
kind = "npm"
path = "."
globs = ["src/**", "tsconfig.json", "package.json"]
first_version = "__VERSION__"
# Concurrent e2e runs across PRs use timestamp-based versions
# (`0.0.<unix-seconds>`), and npm's implicit `latest` tag rejects
# any publish whose version is below the current `latest` floor.
# Publish under a dedicated dist-tag so cross-run timestamp races
# can't reject each other.
tag = "e2e"
