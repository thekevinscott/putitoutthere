[putitoutthere]
version = 1

[[package]]
name = "piot-fixture-zzz-rust"
kind = "crates"
path = "packages/rust"
globs = ["packages/rust/**"]
first_version = "__VERSION__"

[[package]]
name = "piot-fixture-zzz-python"
kind = "pypi"
path = "packages/python"
globs = ["packages/python/**"]
build = "maturin"
targets = ["x86_64-unknown-linux-gnu", "aarch64-apple-darwin"]
depends_on = ["piot-fixture-zzz-rust"]
first_version = "__VERSION__"
