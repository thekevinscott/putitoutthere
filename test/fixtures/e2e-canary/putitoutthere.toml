# Canary fixture for E2E runs. Publishes to the piot-fixture-zzz-* family
# on npm (OIDC trusted publishing). Reduced to npm-only so the canary
# actually exercises the npm OIDC path on every PR — see test/e2e/README.md.

[putitoutthere]
version = 1

[[package]]
name = "piot-fixture-zzz-cli"
kind = "npm"
path = "npm"
paths = ["npm/**"]
first_version = "__VERSION__"
