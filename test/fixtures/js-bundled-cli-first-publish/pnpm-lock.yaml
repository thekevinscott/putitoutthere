# #288 reproduction. Deliberately-stale lockfile: package.json declares
# optionalDependencies for five per-triple platform packages, but this
# lockfile omits them entirely — the exact shape pnpm 10 produces after
# silently dropping 404'd optionalDependencies. `pnpm install
# --frozen-lockfile` must refuse against this; the engine's #288 fallback
# (in _matrix.yml / release.yml; mirrored to e2e-fixture-job.yml in #305)
# is what makes the workflow recover via `pnpm install --no-frozen-lockfile`.
#
# Hand-written rather than `pnpm install`-generated so the drift is
# reproducible and inspectable; do not regenerate.
lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    devDependencies:
      typescript:
        specifier: ^5.6.0
        version: 5.6.0

packages:

  typescript@5.6.0:
    resolution: {integrity: sha512-7zEQTGwlpAOIv1Ie4WjmwOGE5jSpVTOZRbobv4OY6kJ8usadolLrFLDS9pPjepWeFCWP/PhA9aPMHQTjMbDvUw==}
    engines: {node: '>=14.17'}
    hasBin: true

snapshots:

  typescript@5.6.0: {}
