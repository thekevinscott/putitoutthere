[putitoutthere]
version = 1

[[package]]
name = "@putitoutthere/piot-fixture-zzz-js-napi"
kind = "npm"
path = "."
globs = ["src/**", "Cargo.toml", "package.json"]
build = "napi"
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
first_version = "__VERSION__"
